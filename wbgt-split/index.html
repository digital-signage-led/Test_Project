<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=640, initial-scale=1">
  <title>WBGT 熱中症警報サイネージ 5面</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@700;900&family=Noto+Sans:wght@700;900&display=swap" rel="stylesheet">
  <style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  width:640px;
  height:128px;
  overflow:hidden;
  background:#000;
  font-family:'Noto Sans JP','Noto Sans',sans-serif;
  display:flex;
}
#slide-area{width:512px;height:128px;overflow:hidden;position:relative;flex-shrink:0}
#tr{height:128px;position:absolute;top:0;left:0;display:flex;transition:transform .6s ease-in-out}
.c{width:128px;height:128px;position:relative;flex-shrink:0}
.tb{position:absolute;top:1px;left:0;width:128px;height:25px}
.wb{position:absolute;top:108px;left:0;width:128px;height:20px;background:#fff}
.t{position:absolute;top:5px;width:128px;text-align:center;font-size:16px;font-weight:700;color:#fff}
.w{position:absolute;top:25px;width:128px;text-align:center;font-size:36px;font-weight:900;color:#fff;line-height:40px}
.dvd{position:absolute;top:64px;left:14px;width:100px;height:1.5px;background:rgba(255,255,255,.8)}
.n{position:absolute;top:73px;width:128px;text-align:center;font-size:24px;font-weight:900;color:#fff;line-height:28px;overflow:hidden;white-space:nowrap}
.a{position:absolute;top:109px;width:128px;text-align:center;font-size:14px;font-weight:700;color:#1e1e1e;line-height:18px;overflow:hidden;white-space:nowrap}
#face{
  position:relative;
  width:128px;
  height:128px;
  flex-shrink:0;
  overflow:hidden;
}
.face-rotator{
  position:absolute;
  left:50%;
  top:50%;
  width:100px;
  height:100px;
  border-radius:50%;
  overflow:hidden;
  transform:translate(-50%,-50%) rotate(0deg);
  transform-origin:center center;
  will-change:transform;
}
#face-image{
  width:100px;
  height:100px;
  object-fit:cover;
  display:block;
}
#e{
  display:none;
  width:640px;
  height:128px;
  background:#333;
  color:#fff;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  gap:4px;
}
#e .m{font-size:28px;font-weight:900}
#e .u{font-size:12px;opacity:.8}
  </style>
</head>
<body>
  <div id="slide-area"><div id="tr"></div></div>

  <div id="face">
    <div class="face-rotator" id="face-rotator">
      <img id="face-image" src="./images/face-safe.png" alt="WBGT face">
    </div>
  </div>

  <div id="e">
    <div class="m">WBGT 取得不可</div>
    <div class="u">環境省WBGTデータのURL設定を確認してください</div>
  </div>

  <script>
const C = {
  ms: 30 * 60 * 1000,
  holdMs: 8000,
  rotateMs: 1000,
  retryMs: 15000,
  lat: 34.6937,
  lon: 135.5023,
  region: "07",
  prefecture: "62",
  point: "62078",
  proxy: "https://api.allorigins.win/raw?url=",
  moePageBase: "https://www.wbgt.env.go.jp/wbgt_data.php"
};
const DEMO_MODE = new URLSearchParams(window.location.search).get("demo") === "1";
const DEMO_WBGT = [20, 23, 26, 29, 32];
const DEMO_TEMP = [19.4, 24.2, 28.6, 31.4, 34.0];
let demoLevelIndex = 0;

const L = [
  { min: 31, bg: "#EC3817", tbg: "#EC3817", tbar: "#EE6145", face: "./images/face-danger.png", n: ["危険", "Danger", "Nguy hiểm", "危险"], a: ["作業を直ちに中止", "Stop work immediately", "Dừng công việc ngay", "立即停止作业"] },
  { min: 28, bg: "#FD871A", tbg: "#FD871A", tbar: "#FCA633", face: "./images/face-severe.png", n: ["厳重警戒", "Severe Warning", "Cảnh báo nghiêm trọng", "严重警戒"], a: ["激しい作業は中止", "Stop intense work", "Ngừng làm việc nặng", "停止剧烈作业"] },
  { min: 25, bg: "#FFC700", tbg: "#FFC700", tbar: "#FFD84D", face: "./images/face-warning.png", n: ["警戒", "Warning", "Cảnh báo", "警戒"], a: ["定期的に休憩", "Take regular breaks", "Nghỉ ngơi định kỳ", "定时休息"] },
  { min: 21, bg: "#2BB3E0", tbg: "#2BB3E0", tbar: "#5FC7E8", face: "./images/face-caution.png", n: ["注意", "Caution", "Chú ý", "注意"], a: ["積極的に水分補給", "Actively hydrate", "Uống nước thường xuyên", "及时补水"] },
  { min: -Infinity, bg: "#0289DE", tbg: "#0289DE", tbar: "#319EE3", face: "./images/face-safe.png", n: ["ほぼ安全", "Safe", "An toàn", "基本安全"], a: ["適宜水分補給", "Stay hydrated", "Bổ sung nước", "注意补水"] }
];

const tr = document.getElementById("tr");
const facePanel = document.getElementById("face");
const faceRotator = document.getElementById("face-rotator");
const faceImage = document.getElementById("face-image");
const slideArea = document.getElementById("slide-area");
const errorArea = document.getElementById("e");

for (let i = 0; i < 8; i++) {
  const d = document.createElement("div");
  d.className = "c";
  d.dataset.l = i % 4;
  d.innerHTML = '<div class="tb"></div><div class="wb"></div><div class="t"></div><div class="w"></div><div class="dvd"></div><div class="n"></div><div class="a"></div>';
  tr.appendChild(d);
}
tr.style.width = "1024px";

let step = 0;
function moveConveyorAndFace() {
  step += 1;
  tr.style.transition = `transform ${C.rotateMs}ms ease-in-out`;
  faceRotator.style.transition = `transform ${C.rotateMs}ms ease-in-out`;
  tr.style.transform = `translateX(-${step * 128}px)`;
  faceRotator.style.transform = `translate(-50%,-50%) rotate(${step * 90}deg)`;
}
function startSynchronizedLoop() {
  function nextStep() {
    moveConveyorAndFace();
    if (step >= 4) {
      setTimeout(() => {
        tr.style.transition = "none";
        faceRotator.style.transition = "none";
        step = 0;
        tr.style.transform = "translateX(0)";
        faceRotator.style.transform = "translate(-50%,-50%) rotate(0deg)";
        if (DEMO_MODE) {
          demoLevelIndex = (demoLevelIndex + 1) % 5;
          upd(DEMO_TEMP[demoLevelIndex], DEMO_WBGT[demoLevelIndex]);
        }
        setTimeout(nextStep, C.holdMs);
      }, C.rotateMs);
      return;
    }
    setTimeout(nextStep, C.holdMs + C.rotateMs);
  }
  setTimeout(nextStep, C.holdMs);
}
startSynchronizedLoop();

async function fetchMoeWbgt() {
  const pageUrl = `${C.moePageBase}?region=${C.region}&prefecture=${C.prefecture}&point=${C.point}`;
  const r = await fetch(`${C.proxy}${encodeURIComponent(pageUrl)}`, { cache: "no-store" });
  if (!r.ok) throw new Error("MOE API error");
  const text = await r.text();
  const pointPattern = new RegExp(`submitMapGraph\\([^\\)]*'${C.region}'\\s*,\\s*'${C.prefecture}'\\s*,\\s*'${C.point}'[^\\)]*\\)[\\s\\S]*?<div class="value[^\\"]*">\\s*([-+]?\\d+(?:\\.\\d+)?)\\s*</div>`, "i");
  const matchedPoint = text.match(pointPattern);
  const wbgt = matchedPoint && matchedPoint[1] ? Number(matchedPoint[1]) : null;
  const tempMatch = text.match(/気温[^0-9-+]*([-+]?\d+(?:\.\d+)?)/i);
  const temp = tempMatch && tempMatch[1] ? Number(tempMatch[1]) : null;
  return { wbgt: Number.isFinite(wbgt) ? wbgt : null, temp: Number.isFinite(temp) ? temp : null };
}

async function fetchTempFallback() {
  try {
    const r = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${C.lat}&longitude=${C.lon}&current=temperature_2m&timezone=Asia%2FTokyo`, { cache: "no-store" });
    if (!r.ok) return null;
    const d = await r.json();
    const t = d?.current?.temperature_2m;
    return Number.isFinite(Number(t)) ? Number(t) : null;
  } catch (_) {
    return null;
  }
}

function upd(temp, wbgt) {
  const hasWbgt = typeof wbgt === "number" && Number.isFinite(wbgt);
  const lv = hasWbgt ? L.find((l) => wbgt >= l.min) : L[L.length - 1];
  const wi = hasWbgt ? String(Math.round(wbgt)) : "--";
  const ts = temp == null ? "--.-℃" : `${temp.toFixed(1)}℃`;
  slideArea.style.display = "block";
  facePanel.style.display = "flex";
  errorArea.style.display = "none";
  tr.querySelectorAll(".c").forEach((c) => {
    const i = Number(c.dataset.l);
    c.style.background = lv.tbg;
    c.querySelector(".tb").style.background = lv.tbar;
    c.querySelector(".t").textContent = ts;
    c.querySelector(".w").textContent = wi;
    c.querySelector(".n").textContent = lv.n[i];
    c.querySelector(".a").textContent = lv.a[i];
  });
  facePanel.style.background = lv.bg;
  faceImage.src = lv.face;
}

async function fetchWithRetry(attempts = 3, waitMs = C.retryMs) {
  let lastError = null;
  for (let i = 0; i < attempts; i++) {
    try {
      return await fetchMoeWbgt();
    } catch (e) {
      lastError = e;
      if (i < attempts - 1) await new Promise((resolve) => setTimeout(resolve, waitMs));
    }
  }
  throw lastError || new Error("環境省WBGT取得失敗");
}

async function go() {
  try {
    const [obs, fallbackTemp] = await Promise.all([fetchWithRetry(3, C.retryMs), fetchTempFallback()]);
    upd(obs.temp ?? fallbackTemp, obs.wbgt);
  } catch (e) {
    const fallbackTemp = await fetchTempFallback();
    upd(fallbackTemp, null);
    console.error(e);
  }
}

if (DEMO_MODE) {
  upd(DEMO_TEMP[demoLevelIndex], DEMO_WBGT[demoLevelIndex]);
} else {
  go();
  setInterval(go, C.ms);
}
  </script>
</body>
</html>
