<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WBGT 5段階レイアウトプレビュー</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0e0e12;color:#e8e8e8;font-family:'Segoe UI','Noto Sans JP',sans-serif;padding:20px 24px 40px;}
h1{font-size:20px;font-weight:900;margin-bottom:6px;}
.lead{font-size:13px;color:#aaa;margin-bottom:16px;line-height:1.6;}
.lead a{color:#4fc3f7;}
.toolbar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:20px;font-size:13px;}
.toolbar label{font-weight:700;color:#ccc;}
.toolbar select{background:#1a1a22;color:#eee;border:1px solid #444;border-radius:6px;padding:6px 10px;font:inherit;}
.toolbar a{color:#4fc3f7;margin-left:8px;}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:20px;}
.cell{background:#18181f;border:1px solid #333;border-radius:10px;padding:14px;}
.cell h2{font-size:15px;font-weight:900;margin-bottom:2px;}
.cell .sub{font-size:12px;color:#888;margin-bottom:10px;}
.badge{display:inline-block;font-size:11px;font-weight:700;padding:2px 8px;border-radius:4px;margin-left:6px;vertical-align:middle;}
.viewport{overflow:hidden;background:#000;border:1px solid #444;border-radius:4px;line-height:0;}
.viewport iframe{border:0;transform-origin:0 0;display:block;}
.links{margin-top:10px;font-size:12px;}
.links a{color:#4fc3f7;margin-right:12px;}
</style>
</head>
<body>
<h1>WBGT — 5段階レイアウト一覧</h1>
<p class="lead">
  安全・注意・警戒・厳重警戒・危険のレイアウトを並べて確認できます。<br>
  <a href="signage-preview.html">6解像度プレビュー</a> ·
  <a href="rain-levels-preview.html">大雨 5段階プレビュー</a> ·
  <a href="index.html?demo=1">デモ（単体）</a>
</p>

<div class="toolbar">
  <label for="spec">解像度</label>
  <select id="spec">
    <option value="P3.47|75">P3.47 · 75インチ（432×288）</option>
    <option value="P3.47|100" selected>P3.47 · 100インチ（576×432）</option>
    <option value="P3.47|125">P3.47 · 125インチ（720×576）</option>
    <option value="P2.87|75">P2.87 · 75インチ（528×352）</option>
    <option value="P2.87|100">P2.87 · 100インチ（704×528）</option>
    <option value="P2.87|125">P2.87 · 125インチ（880×704）</option>
  </select>
</div>

<div class="grid" id="grid"></div>

<script>
const LEVELS=[
 {i:0,name:'安全',w:18,bg:'#4A90D9'},
 {i:1,name:'注意',w:23,bg:'#FAD24A'},
 {i:2,name:'警戒',w:26.5,bg:'#F2A91B'},
 {i:3,name:'厳重警戒',w:29.5,bg:'#F47C1B'},
 {i:4,name:'危険',w:33,bg:'#E5302A'}
];
const SIZES={
 'P3.47|75':[432,288],'P3.47|100':[576,432],'P3.47|125':[720,576],
 'P2.87|75':[528,352],'P2.87|100':[704,528],'P2.87|125':[880,704]
};
const MAX_W=320;
const grid=document.getElementById('grid');
const specSel=document.getElementById('spec');
const q=new URLSearchParams(location.search);
if(q.get('pitch')&&q.get('inch')) specSel.value=q.get('pitch')+'|'+q.get('inch');

function render(){
 grid.innerHTML='';
 const key=specSel.value;
 const [pitch,inch]=key.split('|');
 const [w,h]=SIZES[key];
 const scale=Math.min(1,MAX_W/w);
 LEVELS.forEach(L=>{
  const cell=document.createElement('div');
  cell.className='cell';
  cell.innerHTML=`
   <h2>${L.name}<span class="badge" style="background:${L.bg};color:${L.i>=3||L.i===0?'#fff':'#111'}">WBGT ${L.w}</span></h2>
   <div class="sub">${pitch} · ${inch}インチ · ${w}×${h}px</div>
   <div class="viewport" style="width:${Math.round(w*scale)}px;height:${Math.round(h*scale)}px"></div>
   <div class="links">
    <a href="index.html?pitch=${encodeURIComponent(pitch)}&inch=${inch}&demo=1&level=${L.i}&fit=0" target="_blank">フルサイズ（1:1）</a>
    <a href="index.html?pitch=${encodeURIComponent(pitch)}&inch=${inch}&demo=1&level=${L.i}&tune=1&fit=0" target="_blank">フルサイズで微調整</a>
   </div>`;
  const vp=cell.querySelector('.viewport');
  const ifr=document.createElement('iframe');
  ifr.width=w; ifr.height=h;
  ifr.style.width=w+'px'; ifr.style.height=h+'px';
  ifr.style.transform='scale('+scale+')';
  ifr.src='index.html?pitch='+encodeURIComponent(pitch)+'&inch='+inch+'&embed=1&demo=1&level='+L.i+'&v=39&_='+Date.now();
  ifr.title=L.name;
  vp.appendChild(ifr);
  grid.appendChild(cell);
 });
}
specSel.addEventListener('change',render);
render();
</script>
</body>
</html>
