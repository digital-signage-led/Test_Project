<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ソーキ 気象データ</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 512px; height: 128px;
    overflow: hidden; background: #000;
    font-family: 'Noto Sans JP', sans-serif; color: #fff;
  }

  /* スクロール外枠 */
  #ticker {
    width: 512px; height: 128px;
    overflow: hidden; position: relative;
  }

  /* スクロールトラック：コンテンツ×2枚でシームレスループ */
  #track {
    display: flex;
    width: calc(768px * 2);
    height: 128px;
    animation: scroll 12s linear infinite;
  }

  @keyframes scroll {
    0%   { transform: translateX(0); }
    100% { transform: translateX(-768px); }
  }

  /* 1セット分のグリッド */
  .grid {
    display: grid;
    grid-template-columns: repeat(6, 128px);
    width: 768px; height: 128px;
    flex-shrink: 0;
  }

  .cell {
    width: 128px; height: 128px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    border-right: 1px solid #222; gap: 3px;
  }
  .cell:last-child { border-right: none; }
  .lbl { font-size: 11px; color: #888; }
  .ico { width: 32px; height: 32px; object-fit: contain; }
  .val { font-size: 28px; font-weight: 700; line-height: 1; }
  .unt { font-size: 11px; color: #666; margin-left: 2px; }
  .sub { font-size: 11px; font-weight: 700; }
  .lv-warn   { color: #ffca28; }
  .lv-strict { color: #ff7043; }
  .lv-danger { color: #ef5350; }
</style>
</head>
<body>
<div id="ticker">
  <div id="track">

    <!-- 1枚目 -->
    <div class="grid" id="grid1">
      <div class="cell">
        <div class="lbl">温度</div>
        <img class="ico" src="温度.png" alt="">
        <div class="val"><span class="v-tmp">32.4</span><span class="unt">℃</span></div>
      </div>
      <div class="cell">
        <div class="lbl">湿度</div>
        <img class="ico" src="高濃度.png" alt="">
        <div class="val"><span class="v-hum">68</span><span class="unt">%</span></div>
      </div>
      <div class="cell">
        <div class="lbl">風向</div>
        <img class="ico" src="風向.png" alt="">
        <div class="val" style="font-size:20px"><span class="v-wdir">南南西</span></div>
      </div>
      <div class="cell">
        <div class="lbl">風速</div>
        <img class="ico" src="風速.png" alt="">
        <div class="val"><span class="v-wspd">3.2</span><span class="unt">m/s</span></div>
      </div>
      <div class="cell">
        <div class="lbl">雨量</div>
        <img class="ico" src="雨量.png" alt="">
        <div class="val"><span class="v-rain">0.0</span><span class="unt">mm</span></div>
      </div>
      <div class="cell">
        <div class="lbl">WBGT</div>
        <img class="ico" src="WBGT.png" alt="">
        <div class="val"><span class="v-wbgt">29.1</span><span class="unt">℃</span></div>
        <div class="sub lv-strict v-wlv">厳重警戒</div>
      </div>
    </div>

    <!-- 2枚目（ループ用コピー） -->
    <div class="grid" id="grid2">
      <div class="cell">
        <div class="lbl">温度</div>
        <img class="ico" src="温度.png" alt="">
        <div class="val"><span class="v-tmp">32.4</span><span class="unt">℃</span></div>
      </div>
      <div class="cell">
        <div class="lbl">湿度</div>
        <img class="ico" src="高濃度.png" alt="">
        <div class="val"><span class="v-hum">68</span><span class="unt">%</span></div>
      </div>
      <div class="cell">
        <div class="lbl">風向</div>
        <img class="ico" src="風向.png" alt="">
        <div class="val" style="font-size:20px"><span class="v-wdir">南南西</span></div>
      </div>
      <div class="cell">
        <div class="lbl">風速</div>
        <img class="ico" src="風速.png" alt="">
        <div class="val"><span class="v-wspd">3.2</span><span class="unt">m/s</span></div>
      </div>
      <div class="cell">
        <div class="lbl">雨量</div>
        <img class="ico" src="雨量.png" alt="">
        <div class="val"><span class="v-rain">0.0</span><span class="unt">mm</span></div>
      </div>
      <div class="cell">
        <div class="lbl">WBGT</div>
        <img class="ico" src="WBGT.png" alt="">
        <div class="val"><span class="v-wbgt">29.1</span><span class="unt">℃</span></div>
        <div class="sub lv-strict v-wlv">厳重警戒</div>
      </div>
    </div>

  </div>
</div>
</body>
</html>
