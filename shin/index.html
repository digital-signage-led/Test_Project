<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">

<style>
body{
margin:0;
overflow:hidden;
font-family:Arial;
width:640px;
height:128px;
background:#000;
}

.wrap{
position:relative;
width:640px;
height:128px;
overflow:hidden;
}

.scrollArea{
position:absolute;
left:0;
top:0;
width:512px;
height:128px;
overflow:hidden;
}

.track{
display:flex;
width:1024px;
height:128px;
animation:scroll 20s linear infinite;
}

.panel{
width:128px;
height:128px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
color:#fff;
}

.city{font-size:14px;}

.temp{
font-size:40px;
font-weight:bold;
text-shadow:0 0 10px currentColor;
}

.timeBig{
font-size:42px;
font-weight:bold;
}

.wbgt{font-size:14px;}

.line{
width:70px;
height:2px;
background:linear-gradient(to right,transparent,#fff,transparent);
margin:6px 0;
}

.status{
font-size:16px;
font-weight:bold;
letter-spacing:1px;
}

.warning{
font-size:18px;
}

/* 背景 */
.safe{background:#000;}
.danger{background:#FF0000;}

/* 滚动 */
@keyframes scroll{
0%{transform:translateX(0);}
100%{transform:translateX(-512px);}
}

/* 闪烁 */
@keyframes flash{
0%{opacity:1;}
50%{opacity:0.4;}
100%{opacity:1;}
}

.flash{
animation:flash 2s infinite;
}

/* Logo */
.logoArea{
position:absolute;
right:0;
top:0;
width:128px;
height:128px;
display:flex;
justify-content:center;
align-items:center;
}

.logoArea.safe{background:#000;}
.logoArea.danger{background:#FF0000;}

.logoimg{
width:80px;
animation:logoAnim 12s linear infinite;
}

@keyframes logoAnim{
0%{transform:rotate(0deg);}
25%{transform:rotate(0deg);}
35%{transform:rotate(120deg);}
60%{transform:rotate(120deg);}
70%{transform:rotate(240deg);}
85%{transform:rotate(240deg);}
100%{transform:rotate(360deg);}
}
</style>
</head>

<body>

<div class="wrap">

<div class="scrollArea">
<div class="track">

<div class="panel" id="p1"></div>
<div class="panel" id="t1"></div>

<div class="panel" id="p2"></div>
<div class="panel" id="t2"></div>

<div class="panel" id="p3"></div>
<div class="panel" id="t3"></div>

<div class="panel" id="p4"></div>
<div class="panel" id="t4"></div>

</div>
</div>

<div class="logoArea" id="logo">
<img src="logo.png" class="logoimg">
</div>

</div>

<script>

// ===== 温度颜色 =====
function getTempColor(temp){

if(temp < 0) temp = 0;
if(temp > 40) temp = 40;

if(temp <= 20){
let g = Math.floor(255 * (temp/20));
return "rgb(0,"+g+",255)";
}

if(temp <= 30){
let r = Math.floor(255 * ((temp-20)/10));
return "rgb("+r+",255,0)";
}

let g = Math.floor(255 * (1-(temp-30)/10));
return "rgb(255,"+g+",0)";
}

// ===== WBGT =====
function calcWBGT(temp, hum){
return 0.7 * temp + 0.3 * (hum / 5);
}

// ===== 等级 =====
function getLevel(w){
if(w < 25) return ["安全","安全","SAFE","AN TOÀN"];
if(w < 28) return ["注意","注意","CAUTION","CHÚ Ý"];
if(w < 31) return ["警告","警告","WARNING","CẢNH BÁO"];
if(w < 33) return ["危险","危険","DANGER","NGUY HIỂM"];
return ["停止","停止","STOP","DỪNG"];
}

// ===== 时间 =====
function getTime(){
let d = new Date();
let h = d.getHours();
let m = d.getMinutes();
return h + ":" + (m<10?"0"+m:m);
}

// ===== 主逻辑 =====
async function updateData(){

try{

let temp = 28;
let hum = 60;

// ===== 测试模式 =====
let testMode = false;

if(testMode){
temp = 35;
hum = 70;
}

let color = getTempColor(temp);
let wbgt = calcWBGT(temp, hum);
let level = getLevel(wbgt);

let isDanger = wbgt >= 28;
let cls = isDanger ? "danger" : "safe";

// ===== 内容 =====
let texts = [
["大阪","请休息"],
["大阪","休憩してください"],
["OSAKA","TAKE A BREAK"],
["OSAKA","HÃY NGHỈ NGƠI"]
];

// ===== 生成 =====
for(let i=1;i<=4;i++){

let html;

if(isDanger){

// 🔴 危险模式（简化）
html =
'<div class="temp" style="color:'+color+';font-size:52px">'+temp+'℃</div>'+
'<div class="status">'+level[i-1]+'</div>'+
'<div class="warning">⚠️</div>';

}else{

// 🔵 正常模式
html =
'<div class="city">'+texts[i-1][0]+'</div>'+
'<div class="temp" style="color:'+color+'">'+temp+'℃</div>'+
'<div class="wbgt">WBGT '+wbgt.toFixed(1)+'</div>'+
'<div class="line"></div>'+
'<div class="status">'+level[i-1]+'</div>';

}

let p = document.getElementById("p"+i);
p.innerHTML = html;
p.className = "panel "+cls + (isDanger?" flash":"");

// 时间面
let t = document.getElementById("t"+i);
t.innerHTML =
'<div class="timeBig">'+getTime()+'</div>';
t.className = "panel "+cls;

}

// ===== logo =====
let logo = document.getElementById("logo");
logo.className = "logoArea "+cls + (isDanger?" flash":"");

let img = document.querySelector(".logoimg");
img.style.animationDuration = isDanger ? "4s" : "12s";

}catch(e){
console.log(e);
}

}

updateData();
setInterval(updateData,5000);

</script>

</body>
</html>
