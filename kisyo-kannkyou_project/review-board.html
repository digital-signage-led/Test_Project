<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>サイネージ 一括確認ボード</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0; padding: 0 0 48px;
            background: #0d0d0d; color: #ccc;
            font-family: "Segoe UI", "Noto Sans JP", sans-serif;
        }
        header {
            position: sticky; top: 0; z-index: 10;
            background: #1a1a1a; border-bottom: 1px solid #333;
            padding: 14px 20px;
        }
        header h1 { margin: 0 0 10px; font-size: 18px; color: #fff; }
        header p { margin: 0 0 12px; font-size: 13px; color: #999; max-width: 960px; line-height: 1.55; }
        .controls {
            display: flex; flex-wrap: wrap; gap: 12px; align-items: center;
            font-size: 13px;
        }
        button {
            padding: 6px 14px; cursor: pointer; background: #333; color: #fff;
            border: 1px solid #555; border-radius: 4px; font-size: 13px;
        }
        a { color: #7ec8ff; }
        main { padding: 16px; overflow-x: auto; }
        .grid-5 {
            display: grid;
            grid-template-columns: repeat(5, 640px);
            gap: 12px;
            align-items: start;
            width: max-content;
        }
        .col { width: 640px; }
        .col-head {
            position: sticky; top: 0; z-index: 5;
            padding: 10px 12px; margin-bottom: 10px;
            font-size: 14px; font-weight: 700; color: #fff;
            border-radius: 8px; text-align: center;
            border: 1px solid #333;
        }
        .col-head.lv1 { background: linear-gradient(180deg, #55A5E6 38%, #308DD8 38%); }
        .col-head.lv2 { background: linear-gradient(180deg, #FEE968 38%, #FFD92D 38%); color: #111; }
        .col-head.lv3 { background: linear-gradient(180deg, #FECD58 38%, #FFBE2D 38%); color: #111; }
        .col-head.lv4 { background: linear-gradient(180deg, #FF9A38 38%, #FF7E00 38%); }
        .col-head.lv5 { background: linear-gradient(180deg, #E94540 38%, #D61914 38%); }
        .row {
            margin-bottom: 10px;
            border: 1px solid #2a2a2a; border-radius: 6px;
            background: #141414; overflow: hidden;
        }
        .row-head {
            padding: 6px 8px; font-size: 11px; font-weight: 700; color: #fff;
            background: #222; border-bottom: 1px solid #2a2a2a;
            line-height: 1.35;
        }
        .row-head small { display: block; font-weight: 400; color: #888; margin-top: 2px; font-size: 10px; }
        .row-frame { line-height: 0; background: #000; width: 640px; }
        .row-frame iframe {
            width: 640px; height: 128px;
            border: 0; display: block;
        }
        .section-common {
            margin-top: 28px; padding-top: 20px;
            border-top: 1px solid #333;
            width: max-content; max-width: 100%;
        }
        .section-common-title {
            margin: 0 0 8px; font-size: 14px; font-weight: 700; color: #fff;
        }
        .section-common-note {
            margin: 0 0 18px; font-size: 12px; color: #777; line-height: 1.55;
        }
        .common-subsection {
            margin-bottom: 22px;
        }
        .common-subsection h3 {
            margin: 0 0 6px; font-size: 13px; font-weight: 700; color: #ddd;
        }
        .common-subsection p {
            margin: 0 0 10px; font-size: 11px; color: #888; line-height: 1.45;
        }
        .common-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, 640px);
            gap: 10px;
        }
        .common-pair {
            display: grid;
            grid-template-columns: 640px 640px;
            gap: 10px;
            margin-bottom: 10px;
        }
        .common-pair .row { margin-bottom: 0; }
        .common-pair-label {
            grid-column: 1 / -1;
            font-size: 12px; font-weight: 700; color: #aaa;
            margin: 4px 0 0 2px;
        }
        .common-pair-label.sub {
            font-size: 11px; font-weight: 600; color: #777;
            margin-top: 8px;
        }
        .section-design {
            margin-top: 24px; padding-top: 16px;
            border-top: 1px solid #333;
            width: max-content; max-width: 100%;
        }
        .section-design h3 {
            margin: 0 0 6px; font-size: 14px; font-weight: 700; color: #fff;
        }
        .section-design p {
            margin: 0 0 14px; font-size: 12px; color: #888; line-height: 1.5;
        }
        .design-legend {
            display: flex; gap: 16px; margin-bottom: 12px;
            font-size: 11px; color: #999;
        }
        .design-legend span::before {
            content: ''; display: inline-block; width: 10px; height: 10px;
            margin-right: 5px; vertical-align: middle; border-radius: 2px;
        }
        .design-legend .leg-hero::before { background: #C82400; }
        .white-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, 640px);
            gap: 10px;
        }
        .foot-links { padding: 8px 20px; font-size: 13px; }
    </style>
</head>
<body>
<header>
    <h1>サイネージ 一括確認ボード</h1>
    <p>
        <strong>上段：WBGT 5段階 × 5列</strong> — 各暑さ指数レベルで流れるシーンを横並び確認（640×128 · 本番と同速）。
        <br><strong>下段：気象警報レイアウト</strong> — 3段デザイン案・白ベース案の表示確認。
        <br>入口は <a href="demo.html">demo.html</a> · 本番は <a href="index.html">index.html</a>
    </p>
    <div class="controls">
        <button type="button" id="reload">すべて再読込</button>
        <span id="row-count" style="color:#888;font-size:12px"></span>
    </div>
</header>
<main id="board"></main>
<p class="foot-links"><a href="demo.html">← 入口</a> · <a href="index.html">本番表示</a> · <a href="index.html?demo=1">フルデモ</a></p>
<script>
(function () {
    var LEVEL_NAMES = ['ほぼ安全', '注意', '警戒', '厳重警戒', '危険'];
    var RAIN_TYPES = [
        { id: 'raining', tag: '【降雨】' },
        { id: 'approaching', tag: '【雨接近】' },
        { id: 'watch', tag: '【雨雲】' },
        { id: 'soon', tag: '【雨予報】' }
    ];

    function rowsForLevel(lv) {
        var ls = String(lv);
        var prefix = 'L' + lv;
        var rows = [
            { id: prefix + '-s1', label: 'シーン1', sub: 'WBGT下帯', only: '1', level: ls },
            { id: prefix + '-s2', label: 'シーン2', sub: 'アメダス9項目', only: '2', level: ls },
            { id: prefix + '-s3', label: 'シーン3', sub: '4日予報', only: '3', level: ls },
            { id: prefix + '-s4jp', label: 'シーン4', sub: '日本語', only: '4', level: ls, t3lang: 'jp' },
            { id: prefix + '-s4en', label: 'シーン4', sub: 'English', only: '4', level: ls, t3lang: 'en' },
            { id: prefix + '-s4vn', label: 'シーン4', sub: 'Tiếng Việt', only: '4', level: ls, t3lang: 'vn' },
            { id: prefix + '-s4cn', label: 'シーン4', sub: '中文', only: '4', level: ls, t3lang: 'cn' },
            { id: prefix + '-s4all', label: 'シーン4', sub: '全言語', only: '4', level: ls },
            { id: prefix + '-s5', label: 'シーン5', sub: 'WBGT予報', only: '5', level: ls }
        ];
        RAIN_TYPES.forEach(function (r) {
            rows.splice(1, 0, {
                id: prefix + '-s1rain-' + r.id,
                label: 'シーン1',
                sub: r.tag + ' ＋ WBGT',
                only: '1',
                level: ls,
                rain: r.id
            });
        });
        return rows;
    }

    /** 気象庁5段階警戒 L1〜L5（L3＝警報はここに含む） */
    var LEVEL_DESIGN_ROWS = [
        { level: 'early',    tag: 'L1', name: '早期注意情報',   line2: '災害への心構えを高める' },
        { level: 'advisory', tag: 'L2', name: '注意報',         line2: '避難行動を確認…', warntype: 'l2all' },
        { level: 'warning',  tag: 'L3', name: '警報',           line2: '早めに避難・準備など', warntype: 'l3all' },
        { level: 'danger',   tag: 'L4', name: '危険警報',       line2: '危険な場所から全員避難', warntype: 'l4all' },
        { level: 'special',  tag: 'L5', name: '特別警報',       line2: '命の危機 ただちに安全確保！', warntype: 'l5all' }
    ];

    var RAIN_LAYOUT_EXTRAS = [
        { id: 'all-hero', label: '全5段階', sub: 'L1→L5 順送り · 3段デザイン案（統一）', rainwarn: 'all', rainhero: true }
    ];

    var WHITE_DESIGN_ROWS = [
        { id: 'special', tag: 'L5', name: '特別警報', list: '大雨／高潮／暴風／暴風雪／大雪／波浪／大津波', level: 'special', warntype: 'l5all' },
        { id: 'danger', tag: 'L4', name: '危険警報', list: '大雨／土砂／氾濫／高潮', level: 'danger', warntype: 'l4all' },
        { id: 'warning', tag: 'L3', name: '警報', list: '大雨／洪水／高潮／暴風／暴風雪／大雪／波浪／津波／緊急地震／噴火', level: 'warning', warntype: 'l3all' },
        { id: 'advisory', tag: 'L2', name: '注意報', list: '段階7現象＋注意のみ10種＋津波注意', level: 'advisory', warntype: 'l2all' },
        { id: 'all', tag: '全', name: '全4段階順送り', list: 'L5→L4→L3→L2 · 各段階の種別を順送り（プレビュー用）', allLevels: true, rainwarn: 'all' }
    ];

    var board = document.getElementById('board');
    document.getElementById('row-count').textContent =
        'WBGT 5列 × ' + rowsForLevel(1).length + ' 行' +
        ' ＋ 気象警報レイアウト L1〜L5 ＋ 白ベース5本';

    function buildUrl(row) {
        var p = new URLSearchParams();
        p.set('only', row.only);
        p.set('embed', '1');
        if (row.level) p.set('level', row.level);
        if (row.rain) p.set('rain', row.rain);
        if (row.wbgtOff) p.set('wbgtOff', row.wbgtOff);
        if (row.wbgtUnknown) p.set('wbgtUnknown', row.wbgtUnknown);
        if (row.t3lang) p.set('t3lang', row.t3lang);
        if (row.heatalert) p.set('heatalert', row.heatalert);
        if (row.rainwarn) p.set('rainwarn', row.rainwarn);
        if (row.warntype) p.set('warntype', row.warntype);
        if (row.only === 'rainwarn') {
            p.set('rainhero', '1');
        } else {
            if (row.rainhero === true) p.set('rainhero', '1');
            if (row.rainhero === false) p.set('rainhero', '0');
            if (row.rainwhite) p.set('rainwhite', '1');
        }
        return 'index.html?' + p.toString() + '&_=' + Date.now();
    }

    function renderLevelPair(lvRow) {
        var row = {
            id: 'c-rw-' + lvRow.level + '-hero',
            label: lvRow.tag + ' ' + lvRow.name,
            sub: '3段デザイン案（統一） · 中央：発表中の種別を1本にまとめて流す',
            only: 'rainwarn',
            rainwarn: lvRow.level
        };
        if (lvRow.warntype) row.warntype = lvRow.warntype;
        return '<div class="common-subsection">' +
            '<h3>' + lvRow.tag + ' · ' + lvRow.name + '</h3>' +
            '<p>' + lvRow.line2 + '</p>' +
            '<div class="common-grid">' + renderRow(row) + '</div>' +
            '</div>';
    }

    function renderRainLayoutSection() {
        var pairs = LEVEL_DESIGN_ROWS.map(renderLevelPair).join('');
        var extras = RAIN_LAYOUT_EXTRAS.map(renderRainExtraRow).join('');
        return '<div class="section-design">' +
            '<h3>気象警報 5段階 — 統一デザイン（L3警報含む）</h3>' +
            '<p>気象庁5段階警戒をすべて <strong style="color:#ccc">3段デザイン案（rainhero=1）</strong> で表示。' +
            '複数種別（<code style="color:#aaa">warntype=l3all</code> など）は中央帯で1本にまとめて流します。</p>' +
            '<div class="design-legend"><span class="leg-hero">3段デザイン案に統一</span></div>' +
            pairs +
            '<div class="common-pair-label" style="margin-top:12px">順送りデモ</div>' +
            '<div class="common-grid">' + extras + '</div>' +
            '</div>';
    }

    function renderRainExtraRow(extra) {
        return renderRow(Object.assign({
            only: 'rainwarn',
            rainhero: false
        }, extra));
    }

    function renderWhiteRow(wRow) {
        var row = {
            id: 'c-rw-white-' + wRow.id,
            label: wRow.tag + ' ' + wRow.name,
            sub: '3段デザイン案（統一） · 中央：発表中の警報・注意報をまとめて流す',
            only: 'rainwarn'
        };
        if (wRow.rainwarn) row.rainwarn = wRow.rainwarn;
        else if (wRow.level) row.rainwarn = wRow.level;
        if (wRow.warntype) row.warntype = wRow.warntype;
        return renderRow(row);
    }

    function renderRow(row) {
        var src = buildUrl(row);
        var sub = row.sub ? '<small>' + row.sub + '</small>' : '';
        return '<section class="row" id="row-' + row.id + '">' +
            '<div class="row-head">' + row.label + sub + '</div>' +
            '<div class="row-frame"><iframe src="' + src + '" title="' + row.label + '" loading="lazy"></iframe></div>' +
            '</section>';
    }

    function render() {
        var cols = [1, 2, 3, 4, 5].map(function (lv) {
            return '<div class="col">' +
                '<div class="col-head lv' + lv + '">' + lv + ' ' + LEVEL_NAMES[lv - 1] + '</div>' +
                rowsForLevel(lv).map(renderRow).join('') +
                '</div>';
        }).join('');

        var common = '<div class="section-common">' +
            '<h2 class="section-common-title">気象警報レイアウト — 共通表示</h2>' +
            '<p class="section-common-note">WBGT前提。3段デザイン案・白ベース案の確認表示。</p>' +
            renderRainLayoutSection() +
            '<div class="section-design">' +
            '<h3>統一デザイン追加確認（5本）</h3>' +
            '<p>以下もすべて <strong style="color:#ccc">3段デザイン案（rainhero=1）</strong> で統一表示します。</p>' +
            '<div class="design-legend"><span class="leg-hero">?rainhero=1</span></div>' +
            '<div class="white-grid">' + WHITE_DESIGN_ROWS.map(renderWhiteRow).join('') + '</div>' +
            '</div>' +
            '</div>';

        board.innerHTML = '<div class="grid-5">' + cols + '</div>' + common;
    }

    document.getElementById('reload').addEventListener('click', render);
    render();
})();
</script>
</body>
</html>
