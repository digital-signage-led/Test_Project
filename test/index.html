<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>WBGT Signage - Oura</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Noto+Sans+JP:wght@400;500;700;900&display=swap');
        body { margin: 0; padding: 0; background-color: #000; overflow: hidden; font-family: "Inter", "Noto Sans JP", sans-serif; }
        
        /* 全体のキャンバス高さを180pxに調整 */
        .canvas { width: 512px; height: 180px; position: relative; overflow: hidden; }
        .scene { position: absolute; top: 0; left: 0; width: 512px; height: 180px; display: none; }
        .scene.active { display: flex; }

        /* === Scene1: 顔+時刻 === */
        .panel { width: 128px; height: 180px; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; box-sizing: border-box; border-right: 1px solid #222; flex-shrink: 0; gap: 8px; }
        .s1-label { font-size: 16px; font-weight: 700; color: #ebebeb; }
        .time-val { font-size: 38px; font-weight: 800; color: #ebebeb; line-height: 1; font-variant-numeric: tabular-nums; }
        .face-svg { width: 100px; height: 100px; }
        .scene1-state { display: none; width: 512px; height: 180px; flex-direction: row; }
        .scene1-state.active { display: flex; }

        /* === Scene2: 天気コンベア === */
        .s2-panel, .s2-panel-data { width: 128px; height: 180px; display: flex; flex-direction: column; align-items: center; box-sizing: border-box; border-right: 1px solid #222; flex-shrink: 0; padding-top: 15px; padding-bottom: 15px; gap: 8px; overflow: hidden; }
        .s2-loc { font-size: 13px; font-weight: 700; color: #ebebeb; }
        .s2-label { font-size: 16px; font-weight: 700; color: #ebebeb; letter-spacing: 0.42px; }
        .s2-val { display: flex; align-items: flex-end; gap: 2px; }
        .s2-num { font-size: 52px; font-weight: 800; color: #ebebeb; line-height: 1; }
        .s2-unit { font-size: 20px; font-weight: 500; color: rgba(255,255,255,0.8); }
        .weather-svg { width: 90px; height: 90px; }
        .s2-face { width: 100px; height: 100px; }
        .conveyor-track { display: flex; flex-direction: row; width: 1536px; transition: transform 0.6s ease-in-out; }

        /* === Scene4: WBGT予測 コンベア === */
        .forecast-scene { display: none; overflow: hidden; }
        .fc-track { display: flex; flex-direction: row; width: 1536px; transition: transform 0.6s ease-in-out; }
        .fc-panel { width: 128px; height: 180px; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; box-sizing: border-box; border: 1px solid rgba(255,255,255,0.08); flex-shrink: 0; position: relative; gap: 4px; padding: 10px 0; overflow: hidden; }
        .fc-header { font-size: 15px; font-weight: 500; color: rgba(255,255,255,0.55); align-self: stretch; padding-left: 8px; }
        .fc-hour { font-size: 14px; font-weight: 700; color: rgba(255,255,255,0.75); }
        .fc-wbgt { font-size: 42px; font-weight: 800; color: #fff; line-height: 1; }
        .fc-label { font-size: 12px; font-weight: 700; color: rgba(255,255,255,0.9); letter-spacing: 0.55px; }
        .fc-face { width: 40px; height: 40px; position: absolute; top: 8px; right: 8px; }
        .fc-now { border: 2px solid rgba(255,255,255,0.35); }
        .fc-bg-0 { background: rgba(0,80,140,0.45); }
        .fc-bg-1 { background: rgba(153,128,0,0.45); }
        .fc-bg-2 { background: rgba(153,128,0,0.45); }
        .fc-bg-3 { background: rgba(153,64,0,0.45); }
        .fc-bg-4 { background: rgba(153,0,0,0.45); }

        /* === Scene3: ティッカー === */
        .ticker-scene { background-color: #000; display: none; position: relative; overflow: hidden; }
        .ticker-scene.active { display: block !important; }
        .ticker-main { width: 512px; height: 160px; overflow: hidden; position: relative; }
        .ticker-track { display: flex; align-items: center; height: 160px; position: absolute; top: 0; left: 0; }
        .msg-block { width: 256px; height: 160px; display: flex; justify-content: center; align-items: center; flex-shrink: 0; gap: 15px; box-sizing: border-box; padding: 0 12px; }
        .msg-face { width: 60px; height: 60px; flex-shrink: 0; }
        .msg-text { font-size: 22px; font-weight: 800; color: #fff; text-align: center; }
        .ticker-bar { width: 512px; height: 20px; background: rgba(255,255,255,0.06); overflow: hidden; position: absolute; bottom: 0; left: 0; }
        .bar-track { display: flex; align-items: center; height: 20px; position: absolute; top: 0; left: 0; white-space: nowrap; }
        .bar-text { font-size: 10px; font-weight: 400; color: rgba(255,255,255,0.3); letter-spacing: 0.5px; padding-right: 80px; flex-shrink: 0; }
    </style>
</head>
<body>

    <symbol id="face-4" viewBox="0 0 100 100"><circle cx="50" cy="50" r="45" fill="#ff0000"/><line x1="25" y1="35" x2="40" y2="45" stroke="#fff" stroke-width="6"/><line x1="40" y1="35" x2="25" y2="45" stroke="#fff" stroke-width="6"/><line x1="60" y1="35" x2="75" y2="45" stroke="#fff" stroke-width="6"/><line x1="75" y1="35" x2="60" y2="45" stroke="#fff" stroke-width="6"/><path d="M 30 75 Q 35 65 40 75 T 50 75 T 60 75 T 70 75" stroke="#fff" stroke-width="5" fill="none"/></symbol>

</html>
