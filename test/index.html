<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ソーキ サイネージ表示</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 512px;
    height: 128px;
    overflow: hidden;
    background: #000;
  }

  #crop-window {
    width: 512px;
    height: 128px;
    overflow: hidden;
    position: relative;
  }

  iframe {
    position: absolute;
    border: none;
    /* ===== 調整パラメータ ===== */
    /* ページ内の切り抜き開始位置（左上） */
    left: -200px;   /* ← 左右調整: マイナスで右へ移動 */
    top:  -100px;   /* ← 上下調整: マイナスで下へ移動 */

    /* iframeの元サイズ（拡大縮小前） */
    width:  1400px;
    height: 800px;

    /* 縮小率: 128px高さに合わせて調整 */
    transform: scale(0.43);
    transform-origin: top left;
    /* =========================== */
  }
</style>
</head>
<body>
<div id="crop-window">
  <iframe
    src="https://sooki-cloud.jp/signages/26?pwd=eyJfcmFpbHMiOnsiZGF0YSI6WzI2XSwicHVyIjoiU2lnbmFnZVxuc2hhcmVkX3VybF90b2tlblxuIn19--652d40231e39d461230d3656254f07145f2ad759"
    scrolling="no"
    id="sooki-frame">
  </iframe>
</div>

<script>
  // iframeが読み込まれたらスクロールを止める
  document.getElementById('sooki-frame').onload = function() {
    try {
      this.contentWindow.scrollTo(0, 0);
    } catch(e) {}
  };
</script>
</body>
</html>
