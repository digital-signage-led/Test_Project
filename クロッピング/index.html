<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Cropped Card Scroll 512x128</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 512px;
    height: 128px;
    overflow: hidden;
    background: #f3faff;
  }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="screen" width="512" height="128"></canvas>
<script>
const CFG = {
  viewportW: 512,
  viewportH: 128,
  cardSize: 128,
  speedPxPerSec: 24,
  topImagePath: "./clip-top.png",
  bottomImagePath: "./clip-bottom.png",
};

// それぞれカード枠のみを切り出し（隙間を含めない）
const TOP_CROPS = [
  { sx: 30,  sy: 17, sw: 225, sh: 286 }, // WBGT
  { sx: 272, sy: 17, sw: 225, sh: 286 }, // 温度
  { sx: 514, sy: 17, sw: 225, sh: 286 }, // 湿度
  { sx: 757, sy: 17, sw: 225, sh: 286 }, // 風速
];
const BOTTOM_CROPS = [
  { sx: 25,  sy: 16, sw: 353, sh: 436 }, // 日照
  { sx: 405, sy: 16, sw: 353, sh: 436 }, // 湿度
];

const canvas = document.getElementById("screen");
const ctx = canvas.getContext("2d");
ctx.imageSmoothingEnabled = true;

const topImg = new Image();
const bottomImg = new Image();
let scrollX = 0;
let lastTs = 0;
let readyCount = 0;

function drawCard(image, crop, dx) {
  const px = Math.round(dx);
  ctx.drawImage(
    image,
    crop.sx, crop.sy, crop.sw, crop.sh,
    px, 0, CFG.cardSize + 1, CFG.cardSize
  );
}

function drawStrip(startX) {
  const allCards = [
    ...TOP_CROPS.map((c) => ({ image: topImg, crop: c })),
    ...BOTTOM_CROPS.map((c) => ({ image: bottomImg, crop: c })),
  ];
  for (let i = 0; i < allCards.length; i++) {
    const x = startX + i * CFG.cardSize;
    if (x + CFG.cardSize < 0 || x > CFG.viewportW) continue;
    drawCard(allCards[i].image, allCards[i].crop, x);
  }
}

function frame(ts) {
  if (!lastTs) lastTs = ts;
  const dt = Math.min(0.05, (ts - lastTs) / 1000);
  lastTs = ts;

  const stripW = 6 * CFG.cardSize; // 6 * 128 = 768
  scrollX += CFG.speedPxPerSec * dt;
  if (scrollX >= stripW) scrollX -= stripW;

  ctx.fillStyle = "#f3faff";
  ctx.fillRect(0, 0, CFG.viewportW, CFG.viewportH);

  // 継ぎ目なくループ表示
  drawStrip(-scrollX);
  drawStrip(-scrollX + stripW);

  requestAnimationFrame(frame);
}

function onReady() {
  readyCount += 1;
  if (readyCount === 2) requestAnimationFrame(frame);
}
function onError(path) {
  ctx.fillStyle = "#1f2d3d";
  ctx.font = "16px sans-serif";
  ctx.fillText("画像を読み込めません: " + path, 12, 68);
}

topImg.onload = onReady;
bottomImg.onload = onReady;
topImg.onerror = () => onError(CFG.topImagePath);
bottomImg.onerror = () => onError(CFG.bottomImagePath);
topImg.src = CFG.topImagePath;
bottomImg.src = CFG.bottomImagePath;
</script>
</body>
</html>
