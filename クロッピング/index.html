<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>仙台営業所 勉強会用現場 サイネージ（実データ取得・横スクロール）</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Noto+Sans+JP:wght@400;500;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root { --W: 512px; --H: 128px; --CARD: 128px; --STRIP: 768px; }
  html, body {
    width: var(--W); height: var(--H);
    overflow: hidden; background: #f3f4f6;
    font-family: "Inter", "Noto Sans JP", sans-serif;
    color: #111;
  }
  .stage { width: var(--W); height: var(--H); overflow: hidden; position: relative; }
  .track {
    display: flex;
    width: calc(var(--STRIP) * 2); height: var(--H);
    animation: slide 32s linear infinite;
    will-change: transform;
  }
  @keyframes slide {
    from { transform: translateX(0); }
    to   { transform: translateX(calc(-1 * var(--STRIP))); }
  }
  .card {
    width: var(--CARD); height: var(--CARD); flex-shrink: 0;
    background: linear-gradient(160deg, #ffffff 60%, #eef6ff 100%);
    border: 1px solid #e5e7eb;
    border-radius: 8px;
    margin: 4px 3px;
    padding: 8px 10px;
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .head { display: flex; align-items: flex-start; gap: 6px; flex-shrink: 0; }
  .icon-box {
    width: 22px; height: 22px; border-radius: 5px;
    background: #e6f2ff; border: 1px solid #b9dcff;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .icon-box svg { width: 14px; height: 14px; }
  .head-text { display: flex; flex-direction: column; line-height: 1; min-width: 0; flex: 1; }
  .label {
    font-size: 10.5px; font-weight: 700; color: #1f2937;
    line-height: 1.15; word-break: break-all;
  }
  .sensor { font-size: 8px; font-weight: 500; color: #9ca3af; margin-top: 2px; }
  .value-wrap {
    flex: 1;
    display: flex; align-items: flex-end; justify-content: flex-end; padding-right: 4px;
  }
  .value {
    font-size: 32px; font-weight: 800; line-height: 1;
    font-family: "Inter", sans-serif;
    font-variant-numeric: tabular-nums;
    color: #111; letter-spacing: -0.02em;
    transition: opacity 0.3s;
  }
  .value.small { font-size: 24px; }
  .unit-wrap { display: flex; justify-content: flex-end; padding-right: 6px; flex-shrink: 0; }
  .unit { font-size: 11px; font-weight: 700; color: #374151; }

  .badge {
    position: fixed; bottom: 2px; right: 4px;
    font-size: 8px; color: #aaa; letter-spacing: 0.3px;
    z-index: 999; pointer-events: none;
    background: rgba(255,255,255,0.85); padding: 1px 3px; border-radius: 2px;
    max-width: 500px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .badge.live { color: #0a8a0a; }
  .badge.err  { color: #c00; }
</style>
</head>
<body>

<svg style="display:none">
  <symbol id="ic-temp" viewBox="0 0 24 24" fill="none" stroke="#1d8fe1" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <path d="M12 3a2.5 2.5 0 0 0-2.5 2.5v9.2a4.5 4.5 0 1 0 5 0V5.5A2.5 2.5 0 0 0 12 3z"/>
    <circle cx="12" cy="17" r="2" fill="#1d8fe1"/>
  </symbol>
  <symbol id="ic-rain" viewBox="0 0 24 24" fill="none" stroke="#1d8fe1" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <path d="M3 12a9 9 0 0 1 18 0z"/><path d="M12 12v7a2 2 0 0 0 4 0"/>
  </symbol>
  <symbol id="ic-wind" viewBox="0 0 24 24" fill="none" stroke="#1d8fe1" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <path d="M3 8h10a3 3 0 1 0-3-3"/><path d="M3 14h14a3 3 0 1 1-3 3"/><path d="M3 11h7"/>
  </symbol>
  <symbol id="ic-sun" viewBox="0 0 24 24" fill="none" stroke="#1d8fe1" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="4"/>
    <path d="M12 3v2M12 19v2M3 12h2M19 12h2M5.6 5.6l1.4 1.4M17 17l1.4 1.4M5.6 18.4 7 17M17 7l1.4-1.4"/>
  </symbol>
  <symbol id="ic-humi" viewBox="0 0 24 24" fill="#1d8fe1">
    <path d="M12 3c-3.5 5-6 8.2-6 11.2a6 6 0 0 0 12 0c0-3-2.5-6.2-6-11.2z"/>
  </symbol>
</svg>

<div class="badge" id="badge">…</div>

<div class="stage">
  <div class="track" id="track"></div>
</div>

<script>
// ============================================================
//  ソース URL（仙台営業所 勉強会用現場 サイネージ #26）
// ============================================================
const SRC_URL = 'https://sooki-cloud.jp/signages/26?pwd=eyJfcmFpbHMiOnsiZGF0YSI6WzI2XSwicHVyIjoiU2lnbmFnZVxuc2hhcmVkX3VybF90b2tlblxuIn19--652d40231e39d461230d3656254f07145f2ad759';
const REFRESH_MS = 5000;   // 5秒ごとに取得（実URLの体感に近づける）

// CORS プロキシ候補（優先順）
const PROXIES = [
  u => 'https://corsproxy.io/?url='        + encodeURIComponent(u),
  u => 'https://api.allorigins.win/raw?url=' + encodeURIComponent(u),
  u => 'https://api.codetabs.com/v1/proxy/?quest=' + u,
];

// ============================================================
//  カード定義
// ============================================================
const CARDS = [
  { key: 'wbgt', icon: 'temp', label: 'WBGT (推定値)', sensor: 'ラビット 1', unit: '℃',     init: '--' },
  { key: 'tmp',  icon: 'temp', label: '温度',          sensor: 'ラビット 1', unit: '℃',     init: '--' },
  { key: 'hum1', icon: 'humi', label: '湿度',          sensor: 'ラビット 1', unit: '%',     init: '--' },
  { key: 'wnd',  icon: 'wind', label: '風速',          sensor: 'ラビット 1', unit: 'm/sec', init: '--' },
  { key: 'sun',  icon: 'sun',  label: '日照',          sensor: 'ラビット 1', unit: 'lx',    init: '--' },
  { key: 'hum2', icon: 'humi', label: '湿度',          sensor: 'ラビット 1', unit: '%',     init: '--' },
];

function renderCard(c) {
  return `
    <div class="card">
      <div class="head">
        <div class="icon-box"><svg><use href="#ic-${c.icon}"/></svg></div>
        <div class="head-text">
          <div class="label">${c.label}</div>
          <div class="sensor">${c.sensor}</div>
        </div>
      </div>
      <div class="value-wrap"><div class="value" data-key="${c.key}">${c.init}</div></div>
      <div class="unit-wrap"><div class="unit">${c.unit}</div></div>
    </div>`;
}
document.getElementById('track').innerHTML =
  CARDS.map(renderCard).join('') + CARDS.map(renderCard).join('');

// ============================================================
//  値の反映（2セット同時に）
// ============================================================
function updateAll(map) {
  document.querySelectorAll('[data-key]').forEach(el => {
    const v = map[el.dataset.key];
    if (v == null || v === '') return;
    el.textContent = v;
    el.className = (String(v).length >= 5) ? 'value small' : 'value';
  });
}

// ============================================================
//  CORS プロキシ経由で URL を取得
// ============================================================
async function fetchViaProxy(url) {
  // キャッシュバスター：プロキシ側キャッシュを回避
  const buster = '_t=' + Date.now() + Math.random().toString(36).slice(2, 6);
  const busted = url + (url.includes('?') ? '&' : '?') + buster;

  for (const wrap of PROXIES) {
    const ctrl = new AbortController();
    const timer = setTimeout(() => ctrl.abort(), 10000);
    try {
      const res = await fetch(wrap(busted), {
        cache: 'no-store',
        signal: ctrl.signal,
        headers: { 'Cache-Control': 'no-cache', 'Pragma': 'no-cache' },
      });
      clearTimeout(timer);
      if (!res.ok) continue;
      const text = await res.text();
      if (text && text.length > 100) return text;
    } catch (e) {
      clearTimeout(timer);
    }
  }
  throw new Error('全プロキシ失敗');
}

// ============================================================
//  HTML から数値を抽出
// ============================================================
function parseValues(html) {
  // タグを除いてテキストだけに
  const text = html
    .replace(/<script[\s\S]*?<\/script>/gi, ' ')
    .replace(/<style[\s\S]*?<\/style>/gi, ' ')
    .replace(/<[^>]+>/g, ' ')
    .replace(/&nbsp;/g, ' ')
    .replace(/\s+/g, ' ');

  const grab = (labelRe, unitRe) => {
    const re = new RegExp(labelRe.source + '[\\s\\S]{0,200}?(\\d+(?:\\.\\d+)?)\\s*' + unitRe.source);
    const m = text.match(re);
    return m ? m[1] : null;
  };
  const hum = grab(/湿度/, /%/);
  return {
    wbgt: grab(/WBGT\s*\(推定値\)/, /℃/),
    tmp:  grab(/温度/,              /℃/),
    hum1: hum,
    wnd:  grab(/風速/,              /m\/sec/),
    sun:  grab(/日照/,              /lx/),
    hum2: hum,
  };
}

// ============================================================
//  起動 + ポーリング
// ============================================================
const badge = document.getElementById('badge');
function setBadge(text, cls = '') {
  badge.textContent = text;
  badge.className = 'badge ' + cls;
}

let tickRunning = false;
async function tick() {
  if (tickRunning) return;
  tickRunning = true;
  try {
    setBadge('取得中…');
    const html = await fetchViaProxy(SRC_URL);
    const v = parseValues(html);
    console.log('[tick]', new Date().toLocaleTimeString('ja-JP'), v);
    updateAll(v);
    const lastTime = new Date().toLocaleTimeString('ja-JP', { hour12: false });
    const got = Object.entries(v).filter(([,x]) => x != null).map(([k,x]) => `${k}:${x}`).join(' ');
    setBadge('LIVE ' + lastTime + ' | ' + got, 'live');
  } catch (e) {
    console.error('[tick error]', e);
    setBadge('取得失敗：' + e.message, 'err');
  } finally {
    tickRunning = false;
  }
}

tick();
setInterval(tick, REFRESH_MS);

// タブ復帰時に即取得（裏に長時間隠れていた場合の追従）
document.addEventListener('visibilitychange', () => {
  if (!document.hidden) tick();
});

// アニメーションが裏で止まらないように rAF で生存確認
let lastVisible = performance.now();
requestAnimationFrame(function watch(t) {
  if (!document.hidden) lastVisible = t;
  requestAnimationFrame(watch);
});
</script>
</body>
</html>
