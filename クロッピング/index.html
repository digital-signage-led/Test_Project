<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LED Crop 512x128</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden; /* 必須 */
      background: #000; /* 余白を黒に */
    }
    #stage {
      width: 512px;
      height: 128px;
      position: relative;
      overflow: hidden;
      background: #000;
    }
    .crop {
      position: absolute;
      overflow: hidden; /* 必須 */
      background: #000;
      transform: translate(-50%, -50%) scale(1);
      transform-origin: center center;
      left: 50%;
      top: 50%;
    }
    .crop iframe {
      position: absolute;
      width: 1920px;
      height: 1080px;
      border: 0;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="stage">
    <!-- src は指定URLをそのまま（クエリ改変なし）。SETTINGS.sourceUrl と同一文字列にしてください。 -->
    <div class="crop" id="crop">
      <iframe
        id="srcFrame"
        title="サイネージプレビュー"
        loading="eager"
        referrerpolicy="strict-origin-when-cross-origin"
        src="https://sooki-cloud.jp/signages/26?pwd=eyJfcmFpbHMiOnsiZGF0YSI6WzI2XSwicHVyIjoiU2lnbmFnZVxuc2hhcmVkX3VybF90b2tlblxuIn19--652d40231e39d461230d3656254f07145f2ad759"
      ></iframe>
    </div>
  </div>

  <script>
    // ===== ここを調整する箇所 =====
    // 数値は PNG ではなく iframe 内の実ページが表示するため、ローカル／GitHub Pages どちらでもサイト側の更新に追随します。
    // 埋め込み拒否（X-Frame-Options 等）の場合は真っ白になります。そのときは別ホストのプロキシが必要です。
    const SETTINGS = {
      /** 切り抜き元URL（クエリ付きのまま・変更禁止の運用ならここだけ差し替え） */
      sourceUrl:
        "https://sooki-cloud.jp/signages/26?pwd=eyJfcmFpbHMiOnsiZGF0YSI6WzI2XSwicHVyIjoiU2lnbmFnZVxuc2hhcmVkX3VybF90b2tlblxuIn19--652d40231e39d461230d3656254f07145f2ad759",

      ledWidth: 512,
      ledHeight: 128,

      // この画角（上段4カード）向け初期値 — DevTools で実測して微調整
      cropWidth: 970,
      cropHeight: 240,
      iframeLeft: -30,
      iframeTop: -82,

      centerAlign: true, // 中央配置: true / 左上配置: false
      keepAspect: false, // 比率維持(Math.min): true / 全面埋め(Math.max): false

      /** 0 以外: 指定msごとに iframe を再読込（サイトが自動更新しない場合の保険） */
      iframeReloadMs: 0,
    };

    const stage = document.getElementById("stage");
    const crop = document.getElementById("crop");
    const frame = document.getElementById("srcFrame");

    function applyLayout() {
      stage.style.width = `${SETTINGS.ledWidth}px`;
      stage.style.height = `${SETTINGS.ledHeight}px`;

      crop.style.width = `${SETTINGS.cropWidth}px`;
      crop.style.height = `${SETTINGS.cropHeight}px`;

      frame.style.left = `${SETTINGS.iframeLeft}px`;
      frame.style.top = `${SETTINGS.iframeTop}px`;

      const sx = SETTINGS.ledWidth / SETTINGS.cropWidth;
      const sy = SETTINGS.ledHeight / SETTINGS.cropHeight;
      const scale = SETTINGS.keepAspect ? Math.min(sx, sy) : Math.max(sx, sy);

      if (SETTINGS.centerAlign) {
        crop.style.left = "50%";
        crop.style.top = "50%";
        crop.style.transformOrigin = "center center";
        crop.style.transform = `translate(-50%, -50%) scale(${scale})`;
      } else {
        crop.style.left = "0px";
        crop.style.top = "0px";
        crop.style.transformOrigin = "0 0";
        crop.style.transform = `scale(${scale})`;
      }
    }

    frame.src = SETTINGS.sourceUrl;

    window.addEventListener("resize", applyLayout);
    applyLayout();

    if (SETTINGS.iframeReloadMs > 0) {
      const url = SETTINGS.sourceUrl;
      setInterval(() => {
        frame.src = url;
      }, SETTINGS.iframeReloadMs);
    }
  </script>
</body>
</html>
