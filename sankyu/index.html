<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">

<style>
body{
margin:0;
overflow:hidden;
font-family:Arial;
width:640px;
height:128px;
background:#000;
}

.wrap{
position:relative;
width:640px;
height:128px;
overflow:hidden;
}

.scrollArea{
position:absolute;
left:0;
top:0;
width:512px;
height:128px;
overflow:hidden;
}

.track{
display:flex;
width:1024px;
height:128px;
animation:scroll 20s linear infinite;
}

.panel{
width:128px;
height:128px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
color:#fff;
}

.city{font-size:14px;}

.temp{
font-size:40px;
font-weight:bold;
text-shadow:0 0 10px currentColor;
}

.timeBig{
font-size:42px;
font-weight:bold;
}

.wbgt{font-size:14px;}

.line{
width:70px;
height:2px;
background:linear-gradient(to right,transparent,#fff,transparent);
margin:6px 0;
}

.status{
font-size:16px;
font-weight:bold;
letter-spacing:1px;
}

.warning{
font-size:18px;
}

.metrics{
display:flex;
align-items:center;
gap:6px;
margin-top:2px;
font-size:12px;
}

.metricChip{
border:1px solid rgba(255,255,255,0.3);
padding:1px 5px;
border-radius:10px;
}

.wbgtFace{
position:relative;
width:24px;
height:24px;
border-radius:50%;
border:2px solid currentColor;
box-shadow:0 0 6px currentColor, 0 0 12px currentColor;
}

.wbgtFace:before,
.wbgtFace:after{
content:"";
position:absolute;
width:3px;
height:3px;
background:currentColor;
border-radius:50%;
top:7px;
box-shadow:0 0 4px currentColor;
}

.wbgtFace:before{ left:6px; }
.wbgtFace:after{ right:6px; }

.faceMouth{
position:absolute;
left:50%;
bottom:5px;
width:10px;
height:5px;
transform:translateX(-50%);
border-bottom:2px solid currentColor;
border-radius:0 0 10px 10px;
box-shadow:0 0 4px currentColor;
}

.safe{background:#000;}
.danger{background:#FF0000;}

@keyframes scroll{
0%{transform:translateX(0);}
100%{transform:translateX(-512px);}
}

@keyframes flash{
0%{opacity:1;}
50%{opacity:0.4;}
100%{opacity:1;}
}

.flash{
animation:flash 2s infinite;
}

.logoArea{
position:absolute;
right:0;
top:0;
width:128px;
height:128px;
display:flex;
justify-content:center;
align-items:center;
}

.logoArea.safe{background:#000;}
.logoArea.danger{background:#FF0000;}

.logoimg{
width:80px;
animation:logoAnim 12s linear infinite;
}

@keyframes logoAnim{
0%{transform:rotate(0deg);}
25%{transform:rotate(0deg);}
35%{transform:rotate(120deg);}
60%{transform:rotate(120deg);}
70%{transform:rotate(240deg);}
85%{transform:rotate(240deg);}
100%{transform:rotate(360deg);}
}
</style>
</head>

<body>

<div class="wrap">

<div class="scrollArea">
<div class="track">

<div class="panel" id="p1"></div>
<div class="panel" id="t1"></div>

<div class="panel" id="p2"></div>
<div class="panel" id="t2"></div>

<div class="panel" id="p3"></div>
<div class="panel" id="t3"></div>

<div class="panel" id="p4"></div>
<div class="panel" id="t4"></div>

</div>
</div>

<div class="logoArea" id="logo">
<img src="logo.png" class="logoimg">
</div>

</div>

<script>

function getTempColor(temp){
if(temp < 0) temp = 0;
if(temp > 40) temp = 40;

if(temp <= 20){
let g = Math.floor(255 * (temp/20));
return "rgb(0,"+g+",255)";
}

if(temp <= 30){
let r = Math.floor(255 * ((temp-20)/10));
return "rgb("+r+",255,0)";
}

let g = Math.floor(255 * (1-(temp-30)/10));
return "rgb(255,"+g+",0)";
}

function calcWBGT(temp, hum){
return 0.7 * temp + 0.3 * (hum / 5);
}

function getLevel(w){
if(w < 25) return ["安全","安全","SAFE","AN TOÀN"];
if(w < 28) return ["注意","注意","CAUTION","CHÚ Ý"];
if(w < 31) return ["警告","警告","WARNING","CẢNH BÁO"];
if(w < 33) return ["危险","危険","DANGER","NGUY HIỂM"];
return ["停止","停止","STOP","DỪNG"];
}

function getTime(){
let d = new Date();
let h = d.getHours();
let m = d.getMinutes();
return h + ":" + (m<10?"0"+m:m);
}

async function fetchWeather(){
try{
let r = await fetch("https://api.open-meteo.com/v1/forecast?latitude=34.6937&longitude=135.5023&current=temperature_2m,relative_humidity_2m,weather_code&timezone=Asia%2FTokyo");
if(!r.ok) throw new Error("weather api error");
let data = await r.json();
return {
temp: Math.round(data.current.temperature_2m),
hum: Math.round(data.current.relative_humidity_2m),
weatherCode: data.current.weather_code
};
}catch(e){
return { temp: 28, hum: 60, weatherCode: 0 };
}
}

function getWeatherIcon(code){
if(code >= 51) return "☔";
if(code >= 1 && code <= 3) return "☁";
return "☀";
}

async function updateData(){
try{
let weather = await fetchWeather();
let temp = weather.temp;
let hum = weather.hum;

let testMode = false;
if(testMode){
temp = 35;
hum = 70;
}

let color = getTempColor(temp);
let wbgt = calcWBGT(temp, hum);
let level = getLevel(wbgt);
let weatherIcon = getWeatherIcon(weather.weatherCode);

let isDanger = wbgt >= 28;
let cls = isDanger ? "danger" : "safe";

let texts = [
["大阪","请休息"],
["大阪","休憩してください"],
["OSAKA","TAKE A BREAK"],
["OSAKA","HÃY NGHỈ NGƠI"]
];

for(let i=1;i<=4;i++){
let html;

if(isDanger){
html =
'<div class="temp" style="color:'+color+';font-size:52px">'+temp+'℃</div>'+
'<div class="status">'+level[i-1]+'</div>'+
'<div class="warning">⚠️</div>'+
'<div class="metrics">'+
'<span class="metricChip">'+weatherIcon+' '+hum+'%</span>'+
'<span class="metricChip">WBGT '+wbgt.toFixed(1)+'</span>'+
'<div class="wbgtFace" style="color:'+color+'"><div class="faceMouth"></div></div>'+
'</div>';
}else{
html =
'<div class="city">'+texts[i-1][0]+'</div>'+
'<div class="temp" style="color:'+color+'">'+temp+'℃</div>'+
'<div class="wbgt">WBGT '+wbgt.toFixed(1)+'</div>'+
'<div class="line"></div>'+
'<div class="status">'+level[i-1]+'</div>'+
'<div class="metrics">'+
'<span class="metricChip">'+weatherIcon+'</span>'+
'<span class="metricChip">HUM '+hum+'%</span>'+
'<div class="wbgtFace" style="color:'+color+'"><div class="faceMouth"></div></div>'+
'</div>';
}

let p = document.getElementById("p"+i);
p.innerHTML = html;
p.className = "panel "+cls + (isDanger?" flash":"");

let t = document.getElementById("t"+i);
t.innerHTML = '<div class="timeBig">'+getTime()+'</div>';
t.className = "panel "+cls;
}

let logo = document.getElementById("logo");
logo.className = "logoArea "+cls + (isDanger?" flash":"");

let img = document.querySelector(".logoimg");
img.style.animationDuration = isDanger ? "4s" : "12s";

}catch(e){
console.log(e);
}
}

updateData();
setInterval(updateData,5000);

</script>

</body>
</html>
