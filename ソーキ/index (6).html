<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ソーキ 気象データ</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --W: 1920px;
    --H: 320px;
  }

  html, body {
    width: var(--W);
    height: var(--H);
    overflow: hidden;
    background: #000;
    font-family: 'Noto Sans JP', sans-serif;
    color: #fff;
  }

  #grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    height: var(--H);
  }

  .cell {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    border-right: 1px solid #222;
    gap: 8px;
  }
  .cell:last-child { border-right: none; }

  .lbl {
    font-size: 18px;
    font-weight: 400;
    color: #888;
  }

  .ico {
    width: 72px;
    height: 72px;
    object-fit: contain;
  }

  .val {
    font-size: 58px;
    font-weight: 700;
    color: #fff;
    line-height: 1;
  }
  .unt {
    font-size: 20px;
    font-weight: 400;
    color: #666;
    margin-left: 4px;
  }

  .sub {
    font-size: 20px;
    font-weight: 700;
    color: #4db8f0;
  }
  .lv-warn   { color: #ffca28; }
  .lv-strict { color: #ff7043; }
  .lv-danger { color: #ef5350; }

  #overlay {
    position: fixed;
    inset: 0;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    color: #555;
    z-index: 999;
  }
</style>
</head>
<body>

<div id="overlay">取得中...</div>

<div id="grid">
  <div class="cell">
    <div class="lbl">温度</div>
    <img class="ico" src="温度.png" alt="">
    <div class="val"><span id="v-tmp">--</span><span class="unt">℃</span></div>
  </div>
  <div class="cell">
    <div class="lbl">湿度</div>
    <img class="ico" src="高濃度.png" alt="">
    <div class="val"><span id="v-hum">--</span><span class="unt">%</span></div>
  </div>
  <div class="cell">
    <div class="lbl">風向</div>
    <img class="ico" src="風向.png" alt="">
    <div class="val" style="font-size:44px"><span id="v-wdir">--</span></div>
  </div>
  <div class="cell">
    <div class="lbl">風速</div>
    <img class="ico" src="風速.png" alt="">
    <div class="val"><span id="v-wspd">--</span><span class="unt">m/s</span></div>
  </div>
  <div class="cell">
    <div class="lbl">雨量</div>
    <img class="ico" src="雨量.png" alt="">
    <div class="val"><span id="v-rain">--</span><span class="unt">mm</span></div>
  </div>
  <div class="cell">
    <div class="lbl">WBGT</div>
    <img class="ico" src="WBGT.png" alt="">
    <div class="val"><span id="v-wbgt">--</span><span class="unt">℃</span></div>
    <div class="sub" id="v-wlv">--</div>
  </div>
</div>

<script>
const API_URL  = 'https://api.sooki-cloud-portalsystem.jp/api/getDashboardData';
const SITE_ID  = '087260507';
const TOKEN    = 'Bearer wz6Tjn0OU3j90kfLsWoCTwaleYdzaimBXRd4qsrIub5scNu3dEGiaLKsByZa';
const INTERVAL = 60000;

const LEVELS = [
  { min: 31, cls: 'lv-danger',  label: '危険'     },
  { min: 28, cls: 'lv-strict',  label: '厳重警戒' },
  { min: 25, cls: 'lv-warn',    label: '警戒'     },
  { min: 21, cls: '',           label: '注意'     },
  { min:  0, cls: '',           label: 'ほぼ安全' },
];

async function fetchData() {
  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': TOKEN },
      body: JSON.stringify({ siteId: SITE_ID }),
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const json = await res.json();
    const d = json.sensorKinds[0].sensors[0].data;

    document.getElementById('v-tmp').textContent  = d.tmpDetail.value;
    document.getElementById('v-hum').textContent  = d.humdDetail.value;
    document.getElementById('v-wdir').textContent = d.windDetail.value;
    document.getElementById('v-wspd').textContent = d.speedDetail.value;
    document.getElementById('v-rain').textContent = d.rainDetail.value;
    document.getElementById('v-wbgt').textContent = d.wbgtDetail.value;

    const lv = LEVELS.find(l => parseFloat(d.wbgtDetail.value) >= l.min) ?? LEVELS[4];
    const el = document.getElementById('v-wlv');
    el.textContent = d.wbgtSituation.value;
    el.className = `sub ${lv.cls}`;

    document.getElementById('overlay').style.display = 'none';
  } catch (e) {
    document.getElementById('overlay').textContent = `エラー：${e.message}`;
    document.getElementById('overlay').style.display = 'flex';
  }
}

fetchData();
setInterval(fetchData, INTERVAL);
</script>
</body>
</html>
