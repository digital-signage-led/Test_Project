<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>防災モニタリングシステム（WBGT / 大雨情報）</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Noto Sans JP',sans-serif;}

/* ===== FULL-BLEED BOARD ===== */
.board{position:fixed;inset:0;width:100vw;height:100vh;display:flex;flex-direction:column;transition:background 0.35s;}
.hide{display:none!important;}

/* ===== GEAR + DEMO OVERLAY ===== */
#gear{position:fixed;bottom:12px;left:12px;z-index:50;width:34px;height:34px;border-radius:50%;border:none;background:rgba(0,0,0,0.45);color:#fff;font-size:17px;cursor:pointer;opacity:0.45;transition:opacity .2s;}
#gear:hover{opacity:1;}
#demo{position:fixed;bottom:52px;left:12px;z-index:50;background:rgba(20,20,28,0.96);border:1px solid #444;border-radius:10px;padding:12px 14px;display:none;flex-direction:column;gap:10px;max-width:320px;}
#demo.show{display:flex;}
#demo .row{display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
#demo label{color:#ccc;font-size:12px;font-weight:700;min-width:54px;}
#demo button{background:#333;color:#bbb;border:1px solid #555;border-radius:6px;padding:5px 11px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;}
#demo button.on{background:#4fc3f7;color:#06212e;border-color:#4fc3f7;}
#demo input[type=range]{flex:1;min-width:110px;accent-color:#4fc3f7;cursor:pointer;}
#demo .val{color:#4fc3f7;font-size:15px;font-weight:900;min-width:40px;text-align:center;}
#demo .note{color:#f9a825;font-size:10px;line-height:1.4;}
body.prod #gear,body.prod #demo{display:none!important;}

/* ========== WBGT MODE ========== */
.wbgt-hdr{background:#fff;height:16%;display:flex;align-items:center;justify-content:space-between;padding:0 2.2vw;flex-shrink:0;}
.wbgt-hdr .t{font-size:clamp(17px,3.3vw,52px);font-weight:900;color:#111;}
.wbgt-hdr .r{text-align:right;line-height:1.05;}
.wbgt-hdr .d{font-size:clamp(10px,1.4vw,22px);font-weight:700;color:#222;}
.wbgt-hdr .c{font-size:clamp(24px,4.8vw,74px);font-weight:900;color:#111;}

.wbgt-body{flex:1;min-height:0;display:flex;flex-direction:column;padding:1.5vh 2.5vw;transition:background 0.35s;}
.wbgt-top{flex:1;min-height:0;display:flex;align-items:center;}
.wbgt-top .left{flex:1;min-width:0;text-align:center;}
.wbgt-name{font-size:clamp(56px,min(17vw,27vh),310px);font-weight:900;line-height:1;letter-spacing:-0.02em;}
.wbgt-msg{font-size:clamp(20px,5vw,76px);font-weight:700;margin-top:0.8vh;}
.wbgt-face{width:clamp(140px,26vw,400px);flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.wbgt-face img{width:100%;border-radius:50%;filter:drop-shadow(0 4px 10px rgba(0,0,0,0.25));}

.wbgt-cards{display:grid;grid-template-columns:repeat(4,1fr);gap:0.8vw;margin:1vh 0;flex-shrink:0;}
.wcard{background:#fff;border-radius:11px;padding:0.6vh 1vw;min-width:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;}
.wcard .lbl{display:flex;align-items:center;justify-content:center;gap:5px;font-size:clamp(11px,1.6vw,24px);font-weight:700;color:#222;white-space:nowrap;}
.wcard .ic{font-size:clamp(13px,1.9vw,28px);}
.wcard .v{font-size:clamp(18px,3.6vw,54px);font-weight:900;color:#111;line-height:1.05;}
.wcard .u{font-size:clamp(11px,1.5vw,22px);font-weight:700;color:#555;margin-left:2px;}
.wbgt-badge{display:inline-block;color:#fff;font-size:clamp(11px,1.7vw,26px);font-weight:900;border-radius:20px;padding:1px 14px;transition:background 0.35s;}

.wbgt-bar{display:flex;gap:0;flex-shrink:0;}
.wbar{flex:1;border-radius:0;padding:1.4vh 2px;text-align:center;font-weight:900;line-height:1.25;min-width:0;display:flex;flex-direction:column;justify-content:center;align-items:center;}
.wbar .n{font-size:clamp(15px,2.6vw,40px);display:block;}
.wbar .rg{font-size:clamp(13px,2.1vw,32px);display:block;}
.wbar.active{background:transparent!important;}

/* ========== RAIN MODE ========== */
.rain{flex:1;min-height:0;display:flex;flex-direction:column;transition:background 0.35s;--rain-txt:#fff;--rain-divider:#fff;}
.rain-hdr{display:grid;grid-template-columns:1fr auto 1fr;align-items:end;padding:1.2vh 2vw 0.9vh;border-bottom:0.28vh solid var(--rain-txt);flex-shrink:0;}
.rain-hdr-side{min-width:0;}
.rain-hdr .t{font-size:clamp(24px,4.8vw,72px);font-weight:900;line-height:1;text-align:center;color:var(--rain-txt);}
.rain-hdr .r{text-align:right;line-height:1.05;justify-self:end;color:var(--rain-txt);}
.rain-hdr .d{font-size:clamp(11px,1.5vw,24px);font-weight:700;}
.rain-hdr .c{font-size:clamp(22px,4.4vw,68px);font-weight:900;}

.rain-mid{flex:1;min-height:0;display:flex;align-items:stretch;padding:1.4vh 2vw;gap:0;}
.rain-lvbox{width:28%;max-width:340px;flex-shrink:0;display:flex;flex-direction:column;border:0.32vh solid;border-radius:10px;overflow:hidden;}
.rain-lvbox .cap{font-size:clamp(11px,1.55vw,24px);font-weight:900;text-align:center;line-height:1.25;padding:0.75vh 0.5vw;flex-shrink:0;}
.rain-lvbox .lvwrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0.3vh;padding:0.5vh 0;}
.rain-lvbox .lv{font-size:clamp(14px,2vw,32px);font-weight:900;line-height:1;}
.rain-lvbox .num{font-size:clamp(80px,min(15vw,38vh),260px);font-weight:900;line-height:0.88;letter-spacing:-0.03em;}

.rain-vdiv{width:0;border-left:0.22vh solid var(--rain-divider);margin:0 1.6vw;flex-shrink:0;align-self:stretch;}

.rain-main{flex:1;min-width:0;display:flex;flex-direction:column;padding:0.2vh 0 0.4vh;}
.rain-pub{align-self:flex-start;border-radius:999px;font-size:clamp(12px,1.9vw,32px);font-weight:900;padding:0.35vh 1.5vw;line-height:1.15;flex-shrink:0;}
.rain-name{font-size:clamp(32px,min(7vw,12vh),96px);font-weight:900;line-height:1.05;letter-spacing:-0.02em;margin-top:0.6vh;flex-shrink:0;}
.rain-action{flex:1;min-height:0;display:flex;align-items:center;gap:clamp(14px,2.6vw,36px);padding:0.8vh 0 1vh;}
.rain-face{width:clamp(100px,16vw,220px);flex-shrink:0;align-self:center;}
.rain-face img{width:100%;border-radius:50%;filter:drop-shadow(0 3px 10px rgba(0,0,0,0.28));}
.rain-textcol{flex:1;min-width:0;display:flex;flex-direction:column;justify-content:center;gap:clamp(10px,2vh,24px);}
.rain-msg{font-size:clamp(20px,3.8vw,56px);font-weight:900;line-height:1.35;}
.rain-sub{font-size:clamp(18px,2.75vw,44px);font-weight:900;line-height:1.4;text-align:right;margin-top:0.4vh;}

.rain-bar{display:flex;gap:0.7vw;padding:0 2vw 1.4vh;flex-shrink:0;}
.rbar{flex:1;border:0.32vh solid #111;border-radius:9px;padding:0.55vh 4px;text-align:center;font-weight:900;line-height:1.2;min-width:0;}
.rbar .n{font-size:clamp(11px,1.65vw,28px);display:block;}
.rbar .nm{font-size:clamp(9px,1.4vw,22px);display:block;margin-top:0.12vh;}
.rbar.active{background:transparent!important;border-color:transparent!important;}
</style>
</head>
<body>

<button id="gear" onclick="document.getElementById('demo').classList.toggle('show')">⚙</button>
<div id="demo">
  <div class="row">
    <label>表示</label>
    <button id="modeWbgt" class="on" onclick="setMode('wbgt')">WBGT</button>
    <button id="modeRain" onclick="setMode('rain')">大雨情報</button>
  </div>
  <div id="wbgtCtl">
    <div class="row"><label>WBGT</label><input type="range" id="wS" min="15" max="36" step="0.5" value="21.0"><span class="val" id="wV">21.0</span></div>
    <div class="row"><label>温度</label><input type="range" id="tS" min="18" max="42" step="0.5" value="24.0"><span class="val" id="tV">24.0</span></div>
    <div class="row"><label>湿度</label><input type="range" id="hS" min="20" max="100" step="1" value="40"><span class="val" id="hV">40</span></div>
  </div>
  <div id="rainCtl" class="hide">
    <div class="row"><label>警戒レベル</label>
      <button onclick="setRain(1)">1</button><button onclick="setRain(2)">2</button>
      <button onclick="setRain(3)">3</button><button onclick="setRain(4)">4</button><button onclick="setRain(5)">5</button>
    </div>
  </div>
  <div class="note">⚠ 本番: gas/api.gs を貼り付け→「新しいデプロイ」必須。古いGASのままだと取得不可になります。</div>
</div>

<!-- ===== WBGT BOARD ===== -->
<div class="board" id="wbgtBoard">
  <div class="wbgt-hdr">
    <div class="t">熱中症(WBGT)モニタリングシステム</div>
    <div class="r"><div class="d" id="wDate"></div><div class="c" id="wClock">--:--</div></div>
  </div>
  <div class="wbgt-body" id="wBody">
    <div class="wbgt-top">
      <div class="left">
        <div class="wbgt-name" id="wName">安全</div>
        <div class="wbgt-msg"  id="wMsg">適宜に水分補給</div>
      </div>
      <div class="wbgt-face"><img id="wFace" src="" alt=""></div>
    </div>
    <div class="wbgt-cards">
      <div class="wcard"><div class="lbl"><span class="ic">🌡️</span>温度</div><div><span class="v" id="wT">24.0</span><span class="u">℃</span></div></div>
      <div class="wcard"><div class="lbl"><span class="ic">💧</span>湿度</div><div><span class="v" id="wH">40</span><span class="u">%</span></div></div>
      <div class="wcard"><span class="wbgt-badge" id="wBadge">WBGT</span><div><span class="v" id="wW">21.0</span></div></div>
      <div class="wcard"><div class="lbl"><span class="ic">🕐</span>更新時刻</div><div><span class="v" id="wUpd" style="font-size:clamp(16px,3.2vw,46px);">--:--</span></div></div>
    </div>
    <div class="wbgt-bar" id="wBar"></div>
  </div>
</div>

<!-- ===== RAIN BOARD ===== -->
<div class="board hide" id="rainBoard">
  <div class="rain" id="rainArea">
    <div class="rain-hdr" id="rHdr">
      <div class="rain-hdr-side"></div>
      <div class="t">大雨情報</div>
      <div class="r"><div class="d" id="rDate"></div><div class="c" id="rClock">--:--</div></div>
    </div>
    <div class="rain-mid">
      <div class="rain-lvbox" id="rLvBox">
        <div class="cap">現在の警戒レベル</div>
        <div class="lvwrap"><div class="lv">レベル</div><div class="num" id="rNum">5</div></div>
      </div>
      <div class="rain-vdiv" id="rVdiv"></div>
      <div class="rain-main">
        <span class="rain-pub" id="rPub">発表中</span>
        <div class="rain-name" id="rName">大雨特別警報</div>
        <div class="rain-action">
          <div class="rain-face"><img id="rFace" src="" alt=""></div>
          <div class="rain-textcol">
            <div class="rain-msg" id="rMsg">命を守る行動を<br>とってください</div>
            <div class="rain-sub" id="rSub">直ちに安全確保を行ってください</div>
          </div>
        </div>
      </div>
    </div>
    <div class="rain-bar" id="rBar"></div>
  </div>
</div>

<script>
/* ============================================================
   現場ごとの設定（ここだけ編集）
   - GAS_URL 空 → デモ（⚙スライダー）
   - GAS_URL 設定 + DEMO_MODE false → 本番
   ============================================================ */
const CONFIG = {
  DEMO_MODE:    false,       // true=デモ（⚙表示） / false=本番（⚙非表示）★本番はfalse
  DEFAULT_MODE: 'wbgt',      // 起動画面: 'wbgt' | 'rain'
  GAS_URL:        'https://script.google.com/macros/s/AKfycbypX8gmSDsx449D61PUHEkud6863ENczcivJ4axfVxZhLNDtcjx1we7fYTPeTw0kmBx/exec',
  WBGT_POINT:     '453710',  // 環境省 勝浦（いすみ市最寄り・APIは45371）
  RAIN_AREA:      '1223800', // 気象庁 千葉県いすみ市
  FETCH_MIN:      15,        // データ取得間隔（分）
  SHOW_CREDIT:    true,      // データ提供元表示（法令上必須）
};
const LIVE = !!CONFIG.GAS_URL;

function gasUrl(type, extra){
 const sep=CONFIG.GAS_URL.includes('?')?'&':'?';
 const q=new URLSearchParams(Object.assign({type},extra||{}));
 q.set('_',Date.now());
 return CONFIG.GAS_URL+sep+q.toString();
}

const FACES = {
  'safe': 'assets/faces/safe.png',
  'caution': 'assets/faces/caution.png',
  'warning': 'assets/faces/warning.png',
  'severe': 'assets/faces/severe.png',
  'danger': 'assets/faces/danger.png'
};

const W_LEVELS=[
 {name:'安全',msg:'適宜に水分補給',bg:'#4A90D9',txt:'#fff',face:'safe',anim:'bounce'},
 {name:'注意',msg:'体調を注意して作業進行',bg:'#F2C811',txt:'#1a1a1a',face:'caution',anim:''},
 {name:'警戒',msg:'休憩強化',bg:'#F2A91B',txt:'#1a1a1a',face:'warning',anim:''},
 {name:'厳重警戒',msg:'積極的に休憩',bg:'#F47C1B',txt:'#fff',face:'severe',anim:'shake'},
 {name:'危険',msg:'熱中症の危険性が非常に高い',bg:'#E5302A',txt:'#fff',face:'danger',anim:'shake'},
];
const W_PILLS=[
 {n:'安全',rg:'21未満',c:'#4A90D9',t:'#fff'},
 {n:'注意',rg:'21〜25',c:'#FAD24A',t:'#1a1a1a'},
 {n:'警戒',rg:'25〜28',c:'#F9B233',t:'#1a1a1a'},
 {n:'厳重警戒',rg:'28〜31',c:'#F47C20',t:'#fff'},
 {n:'危険',rg:'31以上',c:'#E53528',t:'#fff'},
];
const W_BADGE=['#4A90D9','#FAD24A','#F9B233','#F47C20','#E53528'];
function wIdx(w){if(w<21)return 0;if(w<25)return 1;if(w<28)return 2;if(w<31)return 3;return 4;}
const wBarEl=document.getElementById('wBar');
W_PILLS.forEach((p,i)=>{const d=document.createElement('div');d.className='wbar';d.id='wbar'+i;d.innerHTML=`<span class="n">${p.n}</span><span class="rg">${p.rg}</span>`;wBarEl.appendChild(d);});
function renderWBGT(t,h,w,timeStr){
 const i=wIdx(w),L=W_LEVELS[i];
 document.getElementById('wBody').style.background=L.bg;
 const nm=document.getElementById('wName');nm.textContent=L.name;nm.style.color=L.txt;
 const mg=document.getElementById('wMsg');mg.textContent=L.msg;mg.style.color=L.txt;
 document.getElementById('wT').textContent=(t==null||!isFinite(t))?'−−':t.toFixed(1);
 document.getElementById('wH').textContent=(h==null||!isFinite(h))?'−−':Math.round(h);
 document.getElementById('wW').textContent=w.toFixed(1);
 document.getElementById('wBadge').style.background=W_BADGE[i];
 const f=document.getElementById('wFace');f.src=FACES[L.face];f.className=L.anim;f.style.display='';
 W_PILLS.forEach((p,j)=>{const b=document.getElementById('wbar'+j);b.classList.toggle('active',j===i);
  if(j===i){b.style.background='transparent';b.style.color=L.txt;b.style.borderRadius='0';}
  else{b.style.background=p.c;b.style.color=p.t;
    const lr=(j===0)||(j-1===i), R='16px';
    b.style.borderRadius=`${lr?R:'0'} 0 0 ${lr?R:'0'}`;}
 });
 if(timeStr){document.getElementById('wUpd').textContent=timeStr;}
}
// 取得失敗時：推定値を一切出さず「取得不可」のみ（熱中症事故防止の絶対ルール）
function renderWBGTUnavailable(){
 document.getElementById('wBody').style.background='#555';
 const nm=document.getElementById('wName');nm.textContent='取得不可';nm.style.color='#fff';
 const mg=document.getElementById('wMsg');mg.textContent='データを取得できません';mg.style.color='#fff';
 document.getElementById('wT').textContent='−−';document.getElementById('wH').textContent='−−';document.getElementById('wW').textContent='−−';
 document.getElementById('wBadge').style.background='#888';
 document.getElementById('wFace').style.display='none';
 W_PILLS.forEach((p,j)=>{const b=document.getElementById('wbar'+j);b.classList.remove('active');b.style.background=p.c;b.style.color=p.t;b.style.borderRadius='12px';});
 document.getElementById('wUpd').textContent='取得不可';
}
// デモ（スライダー）
function wUpdate(){
 const w=parseFloat(document.getElementById('wS').value),t=parseFloat(document.getElementById('tS').value),h=parseInt(document.getElementById('hS').value);
 document.getElementById('wV').textContent=w.toFixed(1);document.getElementById('tV').textContent=t.toFixed(1);document.getElementById('hV').textContent=h;
 renderWBGT(t,h,w);
}
// 実データ取得（GAS api.gs → type=all で一括取得）
function applyWbgtData(d){
 const w=parseFloat(d.wbgt),t=parseFloat(d.temp),h=parseFloat(d.humidity);
 if(isFinite(w)) renderWBGT(isFinite(t)?t:null,isFinite(h)?h:null,w,d.time);
 else renderWBGTUnavailable();
}
function applyRainData(d){
 const lv=parseInt(d.level);
 if(lv>=1&&lv<=5){rainLevel=lv;rUpdate();}
 else renderRainUnavailable();
}
async function fetchAll(){
 if(!LIVE) return;
 try{
  const r=await fetch(gasUrl('all',{point:CONFIG.WBGT_POINT,area:CONFIG.RAIN_AREA}),{cache:'no-store'});
  if(!r.ok) throw 0;
  const d=await r.json();
  if(d.error && !d.wbgt && !d.rain) throw 0;
  if(d.wbgt && !d.wbgt.error) applyWbgtData(d.wbgt);
  else renderWBGTUnavailable();
  if(d.rain && d.rain.level>=1) applyRainData(d.rain);
  else renderRainUnavailable();
 }catch(e){
  renderWBGTUnavailable();
  renderRainUnavailable();
 }
}
const R_LEVELS={
 1:{name:'早期注意情報',msg:'今後の気象情報に<br>ご注意ください',sub:'急な天候変化に備え最新情報をご確認ください',bg:'#103246',txt:'#fff',face:'caution',anim:'',box:{fill:'#fff',border:'#111',txt:'#111',capFill:'#111',capTxt:'#fff'},pub:{fill:'#111',txt:'#fff'}},
 2:{name:'大雨注意報',msg:'災害への心構えを<br>高めてください',sub:'屋外作業の安全確認を行ってください',bg:'#F2E700',txt:'#1a1a1a',face:'warning',anim:'',box:{fill:'transparent',border:'#111',txt:'#111',capFill:'#111',capTxt:'#fff'},pub:{fill:'#111',txt:'#fff'}},
 3:{name:'大雨警報',msg:'危険な場所には<br>近づかないでください',sub:'作業の継続可否を確認してください',bg:'#FF2800',txt:'#fff',face:'warning',anim:'shake',box:{fill:'transparent',border:'#fff',txt:'#fff',capFill:'#fff',capTxt:'#FF2800'},pub:{fill:'#fff',txt:'#FF2800'}},
 4:{name:'大雨危険警報',msg:'危険な場所から<br>避難してください',sub:'身の安全を最優先してください',bg:'#AA00AA',txt:'#fff',face:'danger',anim:'shake',box:{fill:'transparent',border:'#fff',txt:'#fff',capFill:'#fff',capTxt:'#AA00AA'},pub:{fill:'#fff',txt:'#AA00AA'}},
 5:{name:'大雨特別警報',msg:'命を守る行動を<br>とってください',sub:'直ちに安全確保を行ってください',bg:'#0C0C0C',txt:'#fff',face:'danger',anim:'shake',box:{fill:'transparent',border:'#fff',txt:'#fff',capFill:'#fff',capTxt:'#111'},pub:{fill:'#fff',txt:'#111'}},
};
const R_PILLS=[
 {lv:'レベル1',nm:'早期注意情報',c:'#fff',t:'#111'},
 {lv:'レベル2',nm:'大雨注意報',c:'#F2E700',t:'#111'},
 {lv:'レベル3',nm:'大雨警報',c:'#FF2800',t:'#fff'},
 {lv:'レベル4',nm:'大雨危険警報',c:'#AA00AA',t:'#fff'},
 {lv:'レベル5',nm:'大雨特別警報',c:'#0C0C0C',t:'#fff'},
];
let rainLevel=1;
const rBarEl=document.getElementById('rBar');
R_PILLS.forEach((p,i)=>{const d=document.createElement('div');d.className='rbar';d.id='rbar'+i;d.innerHTML=`<span class="n">${p.lv}</span><span class="nm">${p.nm}</span>`;rBarEl.appendChild(d);});
function rUpdate(){
 const L=R_LEVELS[rainLevel];
 const area=document.getElementById('rainArea');
 area.style.background=L.bg;
 area.style.setProperty('--rain-txt',L.txt);
 area.style.setProperty('--rain-divider',L.box.border);
 const box=document.getElementById('rLvBox');
 box.style.background=L.box.fill;
 box.style.borderColor=L.box.border;
 box.querySelector('.lv').style.color=L.box.txt;
 document.getElementById('rNum').style.color=L.box.txt;
 const cap=box.querySelector('.cap');
 cap.style.background=L.box.capFill;
 cap.style.color=L.box.capTxt;
 document.getElementById('rNum').textContent=rainLevel;
 const pub=document.getElementById('rPub');pub.style.background=L.pub.fill;pub.style.color=L.pub.txt;
 const nm=document.getElementById('rName');nm.textContent=L.name;nm.style.color=L.txt;
 const mg=document.getElementById('rMsg');mg.innerHTML=L.msg;mg.style.color=L.txt;
 const sb=document.getElementById('rSub');sb.textContent=L.sub;sb.style.color=L.txt;
 const f=document.getElementById('rFace');f.src=FACES[L.face];f.className=L.anim;f.style.display='';
 R_PILLS.forEach((p,i)=>{const b=document.getElementById('rbar'+i);const a=(i+1)===rainLevel;b.classList.toggle('active',a);if(a){b.style.background='transparent';b.style.borderColor='transparent';b.style.color=L.txt;}else{b.style.background=p.c;b.style.borderColor='#111';b.style.color=p.t;}});
}
// 取得失敗時：警戒レベルを推定せず「取得不可」のみ
function renderRainUnavailable(){
 const area=document.getElementById('rainArea');
 area.style.background='#555';
 area.style.setProperty('--rain-txt','#fff');
 area.style.setProperty('--rain-divider','#fff');
 const box=document.getElementById('rLvBox');box.style.background='transparent';box.style.borderColor='#fff';
 box.querySelector('.lv').style.color='#fff';
 document.getElementById('rNum').style.color='#fff';
 const cap=box.querySelector('.cap');cap.style.background='#888';cap.style.color='#fff';
 document.getElementById('rNum').textContent='−';
 const pub=document.getElementById('rPub');pub.style.background='#888';pub.style.color='#fff';
 document.getElementById('rName').textContent='取得不可';document.getElementById('rName').style.color='#fff';
 document.getElementById('rMsg').innerHTML='データを取得できません';document.getElementById('rMsg').style.color='#fff';
 document.getElementById('rSub').textContent='';
 document.getElementById('rFace').style.display='none';
 R_PILLS.forEach((p,i)=>{const b=document.getElementById('rbar'+i);b.classList.remove('active');b.style.background=p.c;b.style.borderColor='#111';b.style.color=p.t;});
}
function setRain(n){rainLevel=n;rUpdate();}
function setMode(m){const w=(m==='wbgt');
 document.getElementById('wbgtBoard').classList.toggle('hide',!w);
 document.getElementById('rainBoard').classList.toggle('hide',w);
 document.getElementById('wbgtCtl').classList.toggle('hide',!w);
 document.getElementById('rainCtl').classList.toggle('hide',w);
 document.getElementById('modeWbgt').classList.toggle('on',w);
 document.getElementById('modeRain').classList.toggle('on',!w);
}
function clock(){const n=new Date(),days=['日','月','火','水','木','金','土'];
 const d=n.getFullYear()+'.'+String(n.getMonth()+1).padStart(2,'0')+'.'+String(n.getDate()).padStart(2,'0')+'（'+days[n.getDay()]+'）';
 const t=String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');
 document.getElementById('wDate').textContent=d;document.getElementById('wClock').textContent=t;if(!LIVE)document.getElementById('wUpd').textContent=t;
 document.getElementById('rDate').textContent=d;document.getElementById('rClock').textContent=t;
}
function tick(){ fetchAll(); }

function initApp(){
 if(!CONFIG.DEMO_MODE){
  document.body.classList.add('prod');
  document.getElementById('gear').classList.add('hide');
  document.getElementById('demo').classList.add('hide');
 }
 setMode(CONFIG.DEFAULT_MODE==='rain'?'rain':'wbgt');
 setInterval(clock,1000);
 clock();
 if(CONFIG.DEMO_MODE){
  ['wS','tS','hS'].forEach(id=>document.getElementById(id).addEventListener('input',wUpdate));
  wUpdate();
  rUpdate();
 }else if(LIVE){
  renderWBGTUnavailable();
  renderRainUnavailable();
  tick();
  setInterval(tick,Math.max(1,CONFIG.FETCH_MIN)*60000);
 }else{
  renderWBGTUnavailable();
  renderRainUnavailable();
 }
}
initApp();

  document.body.appendChild(c);
}
</script>
