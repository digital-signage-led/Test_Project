<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=512, height=128">
<title>WBGT 512×128（4面）</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:512px; height:128px; overflow:hidden; background:#000; }
  #row { display:flex; width:512px; height:128px; }
  .cell {                       /* 1面分（128×128）*/
    position:relative; flex:0 0 128px; width:128px; height:128px; overflow:hidden;
  }
  .crop {                       /* 確定した切り出し範囲 */
    position:absolute; top:0; left:0;
    width:793px; height:643px; overflow:hidden; transform-origin:0 0;
  }
  .crop iframe {
    border:0; position:absolute; width:1920px; height:1500px;
    left:-690px; top:-205px;    /* 確定 */
  }
</style>
</head>
<body>
  <div id="row">
    <div class="cell"><div class="crop"><iframe src="https://www2.edam.ne.jp/Public/00574/Sokutei/WBGT?LoID=2452" scrolling="no"></iframe></div></div>
    <div class="cell"><div class="crop"><iframe src="https://www2.edam.ne.jp/Public/00574/Sokutei/WBGT?LoID=2452" scrolling="no"></iframe></div></div>
    <div class="cell"><div class="crop"><iframe src="https://www2.edam.ne.jp/Public/00574/Sokutei/WBGT?LoID=2452" scrolling="no"></iframe></div></div>
    <div class="cell"><div class="crop"><iframe src="https://www2.edam.ne.jp/Public/00574/Sokutei/WBGT?LoID=2452" scrolling="no"></iframe></div></div>
  </div>
  <script>
    var SQ = 128;   // 1面のサイズ
    document.querySelectorAll('.crop').forEach(function(c){
      var w = parseInt(getComputedStyle(c).width);   // 793
      var h = parseInt(getComputedStyle(c).height);  // 643
      var s = Math.min(SQ / w, SQ / h);              // 歪ませず収める
      var tx = (SQ - w * s) / 2;
      var ty = (SQ - h * s) / 2;
      c.style.transform = 'translate(' + tx + 'px,' + ty + 'px) scale(' + s + ')';
    });
  </script>
</body>
</html>
