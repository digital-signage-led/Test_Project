<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=640, height=128">
<title>WBGT 640×128（キューブ4面+ロゴ / #slid）</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:640px; height:128px; overflow:hidden; background:#000; }
  /* 128×128 の面を5つ横並び（=640×128） */
  .cell { position:absolute; top:0; width:128px; height:128px; overflow:hidden; }
  .cell:nth-child(1){ left:0;     }
  .cell:nth-child(2){ left:128px; }
  .cell:nth-child(3){ left:256px; }
  .cell:nth-child(4){ left:384px; }
  .cell-logo { left:512px; }  /* 513px目〜640px目（128×128） */
  .cell-logo img {
    display:block;
    width:128px;
    height:128px;
  }
  .crop {
    position:absolute; top:0; left:0;
    width:337px; height:398px;        /* 位置合わせ確定値 */
    overflow:hidden; transform-origin:0 0;
  }
  .crop iframe {
    border:none; position:absolute; width:1920px; height:1500px;
    left:-872px; top:-359px;
  }
</style>
</head>
<body>
  <div class="cell"><div class="crop"><iframe src="https://www2.edam.ne.jp/Public/00574/Sokutei/WBGT?LoID=2452" scrolling="no"></iframe></div></div>
  <div class="cell"><div class="crop"><iframe src="https://www2.edam.ne.jp/Public/00574/Sokutei/WBGT?LoID=2452" scrolling="no"></iframe></div></div>
  <div class="cell"><div class="crop"><iframe src="https://www2.edam.ne.jp/Public/00574/Sokutei/WBGT?LoID=2452" scrolling="no"></iframe></div></div>
  <div class="cell"><div class="crop"><iframe src="https://www2.edam.ne.jp/Public/00574/Sokutei/WBGT?LoID=2452" scrolling="no"></iframe></div></div>
  <div class="cell cell-logo"><img src="assets/sankyu_logo.png" alt=""></div>
  <script>
    var SQ = 128;
    var TOPCUT = 1;   // 上端だけ削る量(px)。上の線が残るなら 2 に。下・左右は不変
    document.querySelectorAll('.crop').forEach(function(c){
      var w = parseInt(getComputedStyle(c).width);   // 337
      var h = parseInt(getComputedStyle(c).height);  // 398
      // 横幅は128ぴったり / 縦は上にTOPCUTだけはみ出させ、その分を上端で切る
      c.style.transform =
        'translate(0px,' + (-TOPCUT) + 'px) scale(' + (SQ / w) + ',' + ((SQ + TOPCUT) / h) + ')';
    });
  </script>
</body>
</html>
